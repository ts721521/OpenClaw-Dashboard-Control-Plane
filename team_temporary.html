<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw · 临时召唤页面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3f5f2;
      --panel: #ffffff;
      --ink: #1f2a24;
      --muted: #5d6c62;
      --brand: #0f7b57;
      --brand-2: #145a43;
      --line: #d8dfd8;
      --shadow: 0 8px 24px rgba(16, 36, 24, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Manrope, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at -10% -10%, #dff0e6 0%, transparent 65%),
        radial-gradient(1200px 500px at 120% 0%, #f7e8d8 0%, transparent 60%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      min-height: 100vh;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(170deg, #f8fcf9 0%, #edf4ef 100%);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
    }

    .brand { border-bottom: 1px solid var(--line); padding-bottom: 12px; }
    .brand h2 { margin: 0; font-size: 20px; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }

    .menu { display: grid; gap: 8px; }
    .menu a {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .menu a:hover { border-color: #8ebea4; background: #f1faf4; }
    .menu a.active {
      border-color: #7fb497;
      background: linear-gradient(135deg, #e9f7ef 0%, #f7f6ef 100%);
      color: var(--brand);
    }

    .shell { max-width: 1520px; margin: 0 auto; padding: 24px 24px 24px 0; min-width: 0; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 12px;
    }

    .top h1 { margin: 0; font-size: 18px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      text-decoration: none;
      font-size: 13px;
    }
    .btn:hover { border-color: var(--brand); color: var(--brand); }
    .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; border-color: transparent; }

    .subnav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 8px;
    }
    .subnav a {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fbf9;
      color: #355246;
      text-decoration: none;
      font-size: 12px;
      font-weight: 800;
      padding: 8px 12px;
    }
    .subnav a:hover { border-color: #8fc3a7; }
    .subnav a.active {
      border-color: #7fb497;
      color: var(--brand);
      background: linear-gradient(130deg, #eaf8ef 0%, #f8f5eb 100%);
    }

    .top .subnav { margin: 0; border: none; background: transparent; box-shadow: none; padding: 0; flex: 1; justify-content: center; }
    .top .actions { margin-left: auto; }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 14px;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { border-top: 1px solid var(--line); padding: 10px 8px; text-align: left; font-size: 13px; }
    th { color: var(--muted); font-size: 12px; font-weight: 700; }

    .mono { font-family: "IBM Plex Mono", monospace; font-size: 12px; }
    .empty { color: var(--muted); font-size: 13px; }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      .side { position: static; height: auto; }
      .shell { padding: 10px 0; }
      .top { flex-wrap: wrap; align-items: flex-start; }
      .top .actions { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <h2>OpenClaw</h2>
        <p>Dashboard 控制台</p>
      </div>
      <nav class="menu">
        <a class="active" href="team_dashboard.html">团队管理中心</a>
        <a href="task_dashboard.html">任务管理中心</a>
        <a href="system_dashboard.html">系统架构管理中心</a>
      </nav>
    </aside>

    <main class="shell">
      <header class="top">
        <div><h1>临时召唤</h1></div>
        <nav class="subnav">
          <a href="team_dashboard.html">团队总览</a>
          <a href="team_standalone.html">独立 Agent</a>
          <a class="active" href="team_temporary.html">临时召唤</a>
        </nav>
        <div class="actions">
          <button class="btn primary" id="refreshBtn">刷新</button>
        </div>
      </header>

      <section class="card">
        <div style="font-size:14px;font-weight:800;margin-bottom:8px;">临时召唤记录</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">更新时间：<span id="updatedAt">-</span></div>
        <div id="tableRoot"></div>
      </section>
    </main>
  </div>

  <script>
    const API = `${window.location.protocol}//${window.location.host}`;
    const safe = (v) => (v === null || v === undefined || v === '' ? '-' : String(v));

    async function fetchJSON(path) {
      const res = await fetch(`${API}${path}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function renderTable(items) {
      const root = document.getElementById('tableRoot');
      if (!items.length) {
        root.innerHTML = '<div class="empty">暂无临时召唤 Agent 记录</div>';
        return;
      }

      root.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>临时 Agent</th>
              <th>召唤者</th>
              <th>来源任务</th>
              <th>来源字段</th>
              <th>首次发现时间</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((x) => `
              <tr>
                <td class="mono">${safe(x.agent_id)}</td>
                <td class="mono">${safe(x.summoned_by)}</td>
                <td class="mono">${safe(x.source_task)}</td>
                <td class="mono">${safe(x.source)}</td>
                <td class="mono">${safe(x.first_seen)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    async function loadPage() {
      const data = await fetchJSON('/api/temporary-agents');
      const items = data.agents || [];

      renderTable(items);
      document.getElementById('updatedAt').textContent = new Date(data.updated_at || Date.now()).toLocaleString('zh-CN');
    }

    async function safeLoad() {
      try {
        await loadPage();
      } catch (err) {
        console.error(err);
        alert(`加载失败: ${err.message}`);
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', safeLoad);
    safeLoad();
    setInterval(safeLoad, 20000);
  </script>
</body>
</html>
