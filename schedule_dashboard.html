<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Dashboard - 任务排程管理中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1800px; margin: 0 auto; }
        .header { background: white; border-radius: 15px; padding: 20px 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #667eea; font-size: 28px; font-weight: 700; }
        .nav-tabs { display: flex; gap: 10px; }
        .nav-tab { padding: 10px 20px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .nav-tab.active { background: #667eea; color: white; }
        .nav-tab:hover { background: #667eea; color: white; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .panel h3 { color: #667eea; margin-bottom: 20px; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .unclaimed-list { display: flex; flex-direction: column; gap: 15px; }
        .unclaimed-task { border: 2px solid #f59e0b; border-radius: 12px; padding: 20px; background: #fffbeb; }
        .unclaimed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .unclaimed-title { font-size: 16px; font-weight: 700; color: #333; }
        .unclaimed-badge { padding: 5px 12px; background: #f59e0b; color: white; border-radius: 15px; font-size: 12px; font-weight: 600; }
        .unclaimed-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 2px solid #f0f0f0; }
        .meta-item { display: flex; flex-direction: column; gap: 5px; }
        .meta-label { font-size: 12px; color: #999; }
        .meta-value { font-size: 14px; color: #333; font-weight: 600; }
        .agent-workload { display: flex; flex-direction: column; gap: 20px; }
        .agent-card { border: 2px solid #f0f0f0; border-radius: 12px; padding: 20px; transition: all 0.3s; }
        .agent-card:hover { border-color: #667eea; box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2); }
        .agent-card.high-load { border-left: 4px solid #ef4444; }
        .agent-card.medium-load { border-left: 4px solid #f59e0b; }
        .agent-card.low-load { border-left: 4px solid #10b981; }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .agent-name { font-size: 16px; font-weight: 700; color: #333; }
        .agent-role { padding: 3px 10px; background: #f0f0f0; border-radius: 12px; font-size: 12px; color: #666; }
        .agent-status { display: flex; gap: 20px; margin-bottom: 15px; }
        .status-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; }
        .status-working { background: #10b981; }
        .status-idle { background: #f59e0b; }
        .current-task { background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .current-task-title { font-size: 13px; color: #999; margin-bottom: 8px; }
        .current-task-name { font-weight: 600; color: #667eea; }
        .progress-bar { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 4px; }
        .queue-section { background: #f8f9ff; padding: 15px; border-radius: 8px; }
        .queue-title { font-size: 13px; color: #999; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .queue-count { padding: 2px 8px; background: #667eea; color: white; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .queue-list { display: flex; flex-direction: column; gap: 8px; }
        .queue-item { padding: 10px; background: white; border-radius: 6px; font-size: 13px; color: #333; border-left: 3px solid #667eea; }
        .empty-queue { text-align: center; padding: 20px; color: #999; font-size: 13px; }
        .schedule-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .overview-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; }
        .overview-number { font-size: 36px; font-weight: 700; color: #667eea; margin-bottom: 5px; }
        .overview-label { font-size: 14px; color: #666; }
        .refresh-btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .loading { text-align: center; padding: 40px; color: white; font-size: 18px; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .last-update { color: #999; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 OpenClaw Dashboard - 任务排程管理中心</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="nav-tab" onclick="location.href='team_dashboard.html'">👥 团队管理中心</button>
                <button class="nav-tab" onclick="location.href='task_dashboard.html'">📋 任务管理中心</button>
                <button class="nav-tab" onclick="location.href='system_dashboard.html'">🏗️ 系统架构</button>
                <button class="refresh-btn" onclick="loadSchedule()">🔄 刷新</button>
            </div>
        </div>
        
        <div class="schedule-overview">
            <div class="overview-card">
                <div class="overview-number" id="activeTasks">-</div>
                <div class="overview-label">🔄 进行中任务</div>
            </div>
            <div class="overview-card">
                <div class="overview-number" id="unclaimedTasks">-</div>
                <div class="overview-label">⚠️ 无人认领任务</div>
            </div>
            <div class="overview-card">
                <div class="overview-number" id="totalAgents">-</div>
                <div class="overview-label">👤 Agent 总数</div>
            </div>
        </div>
        
        <div class="main-grid">
            <div class="panel">
                <h3>⚠️ 无人认领任务 <span style="font-size: 12px; color: #999; font-weight: normal;">（已创建但无人认领）</span></h3>
                <div id="unclaimedList" class="unclaimed-list">
                    <div class="loading">🔄 正在加载...</div>
                </div>
            </div>
            
            <div class="panel">
                <h3>📊 任务总排程 <span style="font-size: 12px; color: #999; font-weight: normal;">（进行中任务队列）</span></h3>
                <div id="scheduleOverview">
                    <div class="loading">🔄 正在加载...</div>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <h3>👥 Agent 工作负载与队列</h3>
            <div id="agentWorkload" class="agent-workload">
                <div class="loading">🔄 正在加载...</div>
            </div>
        </div>
        
        <div class="last-update">
            最后更新：<span id="lastUpdate">-</span>
        </div>
    </div>
    
    <script>
        const API_BASE = window.location.protocol + '//' + window.location.host;
        
        async function loadSchedule() {
            try {
                const [scheduleRes, workloadRes] = await Promise.all([
                    fetch(`${API_BASE}/api/schedule`),
                    fetch(`${API_BASE}/api/agent-workload`)
                ]);
                
                const schedule = await scheduleRes.json();
                const workload = await workloadRes.json();
                
                renderOverview(schedule.schedule);
                renderUnclaimed(schedule.schedule.unclaimed);
                renderAgentWorkload(workload.agents);
                
                document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('加载排程失败:', error);
            }
        }
        
        function renderOverview(schedule) {
            document.getElementById('activeTasks').textContent = schedule.active_tasks.length;
            document.getElementById('unclaimedTasks').textContent = schedule.unclaimed.length;
            
            const allAgents = new Set();
            schedule.active_tasks.forEach(t => allAgents.add(t.assigned_to));
            Object.keys(schedule.queue_by_agent).forEach(agent => allAgents.add(agent));
            document.getElementById('totalAgents').textContent = allAgents.size;
        }
        
        function renderUnclaimed(tasks) {
            const container = document.getElementById('unclaimedList');
            
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty-state">✅ 暂无无人认领的任务</div>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="unclaimed-task">
                    <div class="unclaimed-header">
                        <div class="unclaimed-title">${task.task_name}</div>
                        <div class="unclaimed-badge">待认领</div>
                    </div>
                    <div style="font-size: 12px; color: #999; font-family: monospace;">${task.task_id}</div>
                    <div class="unclaimed-meta">
                        <div class="meta-item">
                            <div class="meta-label">创建者</div>
                            <div class="meta-value">${task.created_by}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">创建时间</div>
                            <div class="meta-value">${new Date(task.created_at).toLocaleString('zh-CN')}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">所属团队</div>
                            <div class="meta-value">${getTeamName(task.team)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">任务 ID</div>
                            <div class="meta-value" style="font-family: monospace; font-size: 12px;">${task.task_id}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderAgentWorkload(agents) {
            const container = document.getElementById('agentWorkload');
            
            const agentList = Object.values(agents);
            
            container.innerHTML = agentList.map(agent => {
                const loadClass = agent.load === 'high' ? 'high-load' : agent.load === 'medium' ? 'medium-load' : 'low-load';
                const hasCurrentTask = agent.current_task !== null;
                const queueCount = agent.queued_tasks ? agent.queued_tasks.length : 0;
                
                return `
                    <div class="agent-card ${loadClass}">
                        <div class="agent-header">
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-role">${agent.role}</div>
                        </div>
                        <div class="agent-status">
                            <div class="status-item">
                                <div class="status-indicator ${hasCurrentTask ? 'status-working' : 'status-idle'}"></div>
                                <span>${hasCurrentTask ? '工作中' : '待工'}</span>
                            </div>
                            <div class="status-item">
                                <span>负载：</span>
                                <span style="font-weight: 600; color: ${agent.load === 'high' ? '#ef4444' : agent.load === 'medium' ? '#f59e0b' : '#10b981'};">
                                    ${agent.load === 'high' ? '高' : agent.load === 'medium' ? '中' : '低'}
                                </span>
                            </div>
                            <div class="status-item">
                                <span>已完成：${agent.completed_tasks} 个</span>
                            </div>
                        </div>
                        ${hasCurrentTask ? `
                            <div class="current-task">
                                <div class="current-task-title">📍 当前任务</div>
                                <div class="current-task-name">${agent.current_task.task_name}</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${agent.current_task.progress}%"></div>
                                </div>
                                <div style="font-size: 11px; color: #999; margin-top: 5px;">进度：${agent.current_task.progress}%</div>
                            </div>
                        ` : '<div class="empty-state" style="padding: 10px; font-size: 13px;">暂无当前任务</div>'}
                        <div class="queue-section">
                            <div class="queue-title">
                                <span>📋 排队任务</span>
                                <span class="queue-count">${queueCount}</span>
                            </div>
                            ${queueCount > 0 ? `
                                <div class="queue-list">
                                    ${agent.queued_tasks.map(task => `
                                        <div class="queue-item">${task.task_name}</div>
                                    `).join('')}
                                </div>
                            ` : '<div class="empty-queue">暂无排队任务</div>'}
                        </div>
                    </div>
                `;
            }).join('');
            
            // 渲染总排程
            document.getElementById('scheduleOverview').innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 15px;">
                    ${agentList.filter(a => a.current_task).map(agent => `
                        <div style="padding: 15px; background: #f8f9ff; border-radius: 8px; border-left: 4px solid #667eea;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <div style="font-weight: 600; color: #333;">${agent.name}</div>
                                <div style="font-size: 12px; color: #999;">${agent.role}</div>
                            </div>
                            <div style="font-size: 14px; color: #667eea; font-weight: 600; margin-bottom: 8px;">${agent.current_task.task_name}</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${agent.current_task.progress}%"></div>
                            </div>
                            <div style="font-size: 11px; color: #999; margin-top: 5px;">进度：${agent.current_task.progress}%</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        
        function getTeamName(teamId) {
            const map = { 'team-rd': '研发团队', 'team-km': '知识管理团队', 'team-braintrust': '智囊团' };
            return map[teamId] || teamId;
        }
        
        window.onload = () => { loadSchedule(); setInterval(loadSchedule, 30000); };
    </script>
</body>
</html>
