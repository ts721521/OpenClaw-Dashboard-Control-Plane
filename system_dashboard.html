<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw · 系统架构管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eff4ef;
      --panel: #ffffff;
      --ink: #18231d;
      --muted: #5e6f63;
      --line: #d2ddd4;
      --brand: #116346;
      --brand-2: #0e4a36;
      --accent: #bf6e1d;
      --soft: #eef7f2;
      --shadow: 0 12px 30px rgba(16, 35, 24, 0.1);
      --radius: 14px;
      --danger: #b9513f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Manrope, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 540px at -8% -2%, #dbeee2 0%, transparent 66%),
        radial-gradient(1000px 520px at 118% -5%, #f7ead8 0%, transparent 62%),
        var(--bg);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      min-height: 100vh;
      gap: 14px;
      padding: 14px;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(170deg, #f8fcf9 0%, #edf4ef 100%);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
    }

    .brand {
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .menu {
      display: grid;
      gap: 8px;
    }

    .menu a {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .menu a:hover {
      border-color: #8ebea4;
      background: #f1faf4;
    }

    .menu a.active {
      border-color: #7fb497;
      background: linear-gradient(135deg, #e9f7ef 0%, #f7f6ef 100%);
      color: var(--brand);
    }

    .side-stats {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .side-stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
    }

    .side-stat .n {
      font-size: 20px;
      font-weight: 800;
      color: var(--brand);
      line-height: 1.1;
    }

    .side-stat .l {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .main {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-width: 0;
    }

    .top {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .top h2 {
      margin: 0;
      font-size: 18px;
    }

    .top p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      border-color: #8cbda2;
      color: var(--brand);
    }

    .btn.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .btn.warn { border-color: #f2d7b4; color: #9e5e19; background: #fff4e6; }

    .tabs {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex;
      gap: 8px;
      overflow: auto;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fafcfb;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #385245;
    }

    .tab:hover { border-color: #95c4ab; }

    .tab.active {
      color: var(--brand);
      border-color: #7bb094;
      background: linear-gradient(130deg, #eaf8ef 0%, #f8f5eb 100%);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 12px;
      min-height: 0;
    }
    .grid.grid--full { grid-template-columns: 1fr; }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .head h3 {
      margin: 0;
      font-size: 16px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .stage-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(transparent 23px, rgba(110, 138, 122, 0.09) 24px),
        linear-gradient(90deg, transparent 23px, rgba(110, 138, 122, 0.09) 24px),
        #f8fbf9;
      background-size: 24px 24px;
      position: relative;
    }

    .stage-inner {
      position: relative;
      min-height: 460px;
      min-width: 860px;
    }

    #edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .node {
      position: absolute;
      border: 1px solid #cbd9d0;
      border-radius: 12px;
      background: #fff;
      padding: 9px 10px;
      box-shadow: 0 8px 18px rgba(16, 36, 24, 0.08);
      z-index: 1;
      color: #233428;
    }

    .node .title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .node .sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }

    .node .badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #d2ddd5;
      background: #f4f8f6;
      color: #3f5a4c;
      font-weight: 700;
    }

    .node.done { border-color: #bde0ca; background: #f2fbf6; }
    .node.active { border-color: #b8d9f2; background: #f1f8ff; }
    .node.pending { border-color: #d4ddd5; background: #fbfdfb; }
    .node.clickable { cursor: pointer; }
    .node.clickable:hover {
      border-color: #7bb094;
      box-shadow: 0 12px 24px rgba(16, 36, 24, 0.12);
      transform: translateY(-1px);
    }
    .node.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(17, 99, 70, 0.16), 0 12px 24px rgba(16, 36, 24, 0.14);
    }

    .flow-list {
      overflow: auto;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      min-height: 0;
      flex: 1;
    }

    .flow-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      background: #fff;
    }

    .flow-item:hover { border-color: #95c4ab; }
    .flow-item.active { border-color: #7bb094; background: #f2fbf6; }

    .flow-item .t {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #1d2a23;
      line-height: 1.3;
    }

    .flow-item .d {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .flow-item .m {
      margin-top: 6px;
      font-size: 11px;
      color: #4f6558;
      font-family: "IBM Plex Mono", monospace;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      padding: 2px 8px;
      color: #355245;
      background: #f7fbf9;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .detail-card {
      padding: 10px;
      display: grid;
      gap: 10px;
      max-height: 42vh;
      overflow: auto;
      background: #fcfefd;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: #4f6558;
      line-height: 1.35;
    }

    .link-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .link-table th,
    .link-table td {
      border-top: 1px solid var(--line);
      padding: 6px 4px;
      text-align: left;
      vertical-align: top;
    }

    .link-table th {
      color: var(--muted);
      font-weight: 700;
      font-size: 11px;
    }

    .placeholder {
      margin: 12px;
      border: 1px dashed #bfd2c4;
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: #5d7365;
      font-size: 13px;
      background: #f8fcf9;
    }

    .governance {
      padding: 12px;
      display: grid;
      gap: 10px;
      overflow: auto;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .editor-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .editor-card h4 { margin: 0; font-size: 14px; }
    .editor-card textarea {
      min-height: 260px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      background: #f9fcfa;
      color: #284136;
      resize: vertical;
    }

    .row-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .prompt-box textarea {
      min-height: 90px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 8px;
      font-size: 13px;
      background: #f9fcfa;
      color: #284136;
      resize: vertical;
    }

    .queue-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .warn-text { color: #9e5e19; font-size: 12px; }
    .danger-text { color: var(--danger); font-size: 12px; }

    .change-detail-inner { font-size: 13px; line-height: 1.45; }
    .change-detail-inner .mono { font-size: 11px; }
    .change-detail-inner ul { margin: 8px 0 0 18px; padding: 0; }
    .collapsible-section { margin-top: 10px; }
    .collapsible-section summary { cursor: pointer; font-weight: 700; padding: 6px 0; }
    .collapsible-section[open] summary { margin-bottom: 8px; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .status-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbf9;
      padding: 10px;
    }
    .status-card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .status-card .value {
      font-size: 12px;
      font-weight: 800;
      color: #22342a;
      line-height: 1.35;
    }
    .inline-link {
      font-size: 12px;
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
    }
    .inline-link:hover { text-decoration: underline; }
    .object-list-note {
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfc;
    }
    .object-kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 6px 10px;
      font-size: 12px;
      align-items: start;
    }
    .object-kv .k {
      color: var(--muted);
      font-weight: 700;
    }
    .object-summary {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbf9;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .config-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .config-group summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 14px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #fbfdfc;
    }
    .config-group summary::-webkit-details-marker { display: none; }
    .config-group-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
    }
    .impact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mode-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .designer-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 12px;
      min-height: 0;
    }
    .designer-stage {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, #f9fcfa 0%, #f0f6f2 100%);
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }
    .designer-toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
    }
    .designer-meta {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      background: rgba(255,255,255,0.6);
    }
    .designer-meta-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
    }
    .designer-meta-card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .designer-meta-card .value {
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.35;
    }
    .designer-canvas-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(transparent 27px, rgba(79, 101, 88, 0.07) 28px),
        linear-gradient(90deg, transparent 27px, rgba(79, 101, 88, 0.07) 28px),
        linear-gradient(180deg, #f9fcfa 0%, #edf4ef 100%);
      background-size: 28px 28px;
    }
    .designer-canvas {
      position: relative;
      min-width: 980px;
      min-height: 560px;
    }
    .designer-edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .workflow-node {
      position: absolute;
      width: 210px;
      min-height: 104px;
      border-radius: 16px;
      border: 1px solid #c6d7cb;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,249,246,0.96));
      box-shadow: 0 16px 32px rgba(16, 36, 24, 0.11);
      padding: 12px;
      z-index: 1;
      cursor: grab;
      user-select: none;
    }
    .workflow-node.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(17, 99, 70, 0.16), 0 18px 34px rgba(16, 36, 24, 0.15);
    }
    .workflow-node.start-node { border-color: #3f8e67; }
    .workflow-node.terminal-node { border-style: dashed; }
    .workflow-node .headline {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .workflow-node .name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
      color: #17261f;
      word-break: break-word;
    }
    .workflow-node .body {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      font-size: 11px;
      color: #405549;
    }
    .workflow-node .mini-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .workflow-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid #d4ddd5;
      background: #f7fbf9;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      color: #355245;
    }
    .designer-side {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .designer-side .editor-card textarea {
      min-height: 120px;
    }
    .designer-field {
      display: grid;
      gap: 6px;
    }
    .designer-field label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }
    .designer-field input,
    .designer-field select,
    .designer-field textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 10px 12px;
      font: inherit;
      background: #f9fcfa;
      color: #284136;
    }
    .designer-field textarea {
      min-height: 90px;
      resize: vertical;
    }
    .designer-list {
      display: grid;
      gap: 8px;
    }
    .designer-list-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
    }
    .designer-list-item:hover { border-color: #8ebea4; }
    .designer-list-item.selected {
      border-color: var(--brand);
      background: #f2fbf6;
    }
    .designer-error-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--danger);
      display: grid;
      gap: 4px;
    }
    .designer-empty {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .designer-path {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: #486152;
    }

    @media (max-width: 1280px) {
      .grid { grid-template-columns: 1fr; }
      .flow-list { max-height: 300px; }
      .detail-card { max-height: none; }
      .editor-grid { grid-template-columns: 1fr; }
      .designer-shell { grid-template-columns: 1fr; }
      .designer-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
      }
      .actions { justify-content: flex-start; }
      .governance .editor-card { padding: 10px; }
      .governance .row-actions { flex-wrap: wrap; gap: 6px; }
      .governance .collapsible-section summary { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <h1>OpenClaw</h1>
        <p>Dashboard 控制台</p>
      </div>

      <nav class="menu">
        <a href="team_dashboard.html">团队管理中心</a>
        <a href="task_dashboard.html">任务管理中心</a>
        <a class="active" href="system_dashboard.html">系统架构管理中心</a>
      </nav>

      <div class="side-stats" id="sideStats">
        <div class="side-stat"><div class="n">-</div><div class="l">团队总数</div></div>
        <div class="side-stat"><div class="n">-</div><div class="l">流程总数</div></div>
        <div class="side-stat"><div class="n">-</div><div class="l">实时更新时间</div></div>
      </div>
    </aside>

    <main class="main">
      <header class="top" id="topBar">
        <nav class="tabs" id="tabs">
          <button class="tab active" data-view="architecture-map">系统架构关系图</button>
          <button class="tab" data-view="governance">治理中心</button>
          <button class="tab" data-view="advanced-config">高级配置</button>
        </nav>
        <div class="actions">
          <button class="btn primary" id="refreshBtn">刷新数据</button>
        </div>
      </header>

      <section class="grid" id="mainGrid">
        <section class="panel">
          <div class="head">
            <h3 id="mainTitle">系统架构关系图</h3>
            <div class="meta">更新时间：<span id="updatedAt">-</span></div>
          </div>
          <div id="mainBody" style="display:flex;flex-direction:column;min-height:0;flex:1;"></div>
        </section>

        <section class="panel" id="contextPanel">
          <div class="head">
            <h3 id="contextTitle">对象详情</h3>
            <div class="meta" id="contextMeta">先从架构关系图选择团队或角色</div>
          </div>
          <div class="flow-list" id="flowList"></div>
          <div class="detail-card" id="flowContext"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="static/workflow_designer_model.js"></script>
  <script>
    const API = `${window.location.protocol}//${window.location.host}`;

    const state = {
      view: 'architecture-map',
      architecture: null,
      flows: [],
      selectedFlowId: null,
      flowDetail: null,
      updatedAt: null,
      teamLeadsDoc: null,
      teamStateDoc: null,
      changeTasks: [],
      reviewTasks: [],
      selectedChangeId: null,
      selectedReviewId: null,
      reviewDetail: null,
      runtimeVersions: null,
      governanceView: 'change',
      recoveryScan: null,
      pendingChanges: {},
      promptProposal: null,
      selectedObjectType: null,
      selectedObjectId: null,
      selectedTargetType: null,
      selectedTargetId: null,
      advancedConfigMode: 'workflow-designer',
      workflowGraphTargetId: null,
      workflowGraph: null,
      selectedWorkflowNodeId: null,
      selectedWorkflowEdgeKey: null,
      workflowLinkFromNodeId: null,
    };

    const safe = (v) => (v === null || v === undefined || v === '' ? '-' : String(v));
    const objectTypeLabel = (type) => {
      if (type === 'team') return '团队';
      if (type === 'member') return '成员';
      if (type === 'agent') return '独立 Agent';
      return '-';
    };

    function getArchitectureIndex() {
      const arch = state.architecture || {};
      const teamById = {};
      const memberById = {};
      const standaloneById = {};
      (arch.teams || []).forEach((team) => {
        teamById[team.team_id] = team;
        (team.members || []).forEach((member) => {
          memberById[member.agent_id] = {
            ...member,
            team_id: team.team_id,
            team_name: team.team_name,
          };
        });
      });
      (arch.standalone_agents || []).forEach((agent) => {
        standaloneById[agent.agent_id] = agent;
      });
      return { teamById, memberById, standaloneById };
    }

    function deriveEditableTarget(type, objectId) {
      const arch = state.architecture || {};
      const idx = getArchitectureIndex();
      if (type === 'team') {
        if (!idx.teamById[objectId]) return null;
        return {
          targetType: 'team',
          targetId: objectId,
          reason: '该团队具备独立团队级配置',
        };
      }
      if (type === 'member') {
        const member = idx.memberById[objectId];
        if (!member) return null;
        return {
          targetType: 'team',
          targetId: member.team_id,
          reason: '该成员无独立底层配置，编辑将进入所属团队配置',
        };
      }
      if (type === 'agent') {
        const collab = (arch.edges || []).filter((edge) => edge.type === 'standalone_collab' && edge.from === objectId);
        if (!collab.length) {
          return {
            targetType: null,
            targetId: null,
            reason: '当前无独立底层配置，只能查看关联治理/团队信息',
          };
        }
        const best = [...collab].sort((a, b) => (b.count || 0) - (a.count || 0))[0];
        return {
          targetType: 'team',
          targetId: best.to,
          reason: '该独立 Agent 无独立底层配置，编辑将进入最近关联团队配置',
        };
      }
      return null;
    }

    function getSelectedObjectMeta() {
      if (!state.selectedObjectType || !state.selectedObjectId) return null;
      const idx = getArchitectureIndex();
      if (state.selectedObjectType === 'team') {
        const team = idx.teamById[state.selectedObjectId];
        if (!team) return null;
        return {
          type: 'team',
          id: team.team_id,
          name: team.team_name,
          currentTeamId: team.team_id,
          currentTeamName: team.team_name,
          editable: deriveEditableTarget('team', team.team_id),
        };
      }
      if (state.selectedObjectType === 'member') {
        const member = idx.memberById[state.selectedObjectId];
        if (!member) return null;
        return {
          type: 'member',
          id: member.agent_id,
          name: member.name,
          currentTeamId: member.team_id,
          currentTeamName: member.team_name,
          editable: deriveEditableTarget('member', member.agent_id),
        };
      }
      if (state.selectedObjectType === 'agent') {
        const agent = idx.standaloneById[state.selectedObjectId];
        if (!agent) return null;
        const editable = deriveEditableTarget('agent', agent.agent_id);
        const editableTeam = editable?.targetId ? idx.teamById[editable.targetId] : null;
        return {
          type: 'agent',
          id: agent.agent_id,
          name: agent.name,
          currentTeamId: editableTeam?.team_id || null,
          currentTeamName: editableTeam?.team_name || null,
          editable,
        };
      }
      return null;
    }

    function syncEditableTargetFromSelection() {
      const meta = getSelectedObjectMeta();
      if (!meta) {
        state.selectedTargetType = null;
        state.selectedTargetId = null;
        return null;
      }
      state.selectedTargetType = meta.editable?.targetType || null;
      state.selectedTargetId = meta.editable?.targetId || null;
      return meta;
    }

    function setSelectedObject(type, objectId) {
      state.selectedObjectType = type || null;
      state.selectedObjectId = objectId || null;
      syncEditableTargetFromSelection();
      syncRouteState();
    }

    function clearSelectedObject() {
      state.selectedObjectType = null;
      state.selectedObjectId = null;
      state.selectedTargetType = null;
      state.selectedTargetId = null;
      syncRouteState();
    }

    function getRelevantConfigGroups(meta) {
      if (!meta || !meta.editable?.targetId) return [];
      return ['team-leads', 'team-state-machines', 'patch-from-prompt', 'publish-queue'];
    }

    function getTargetTeamLead(targetId) {
      return state.teamLeadsDoc?.team_leads?.[targetId] || null;
    }

    function getTargetStateMachine(targetId) {
      return state.teamStateDoc?.team_state_machines?.[targetId] || null;
    }

    const {
      cloneDoc,
      normalizeStateId,
      transitionTypeLabel,
      buildWorkflowGraph: buildWorkflowGraphModel,
      validateWorkflowGraph,
      serializeWorkflowGraph: serializeWorkflowGraphModel,
    } = window.WorkflowDesignerModel;

    function buildWorkflowGraph(targetId) {
      return buildWorkflowGraphModel(state.teamStateDoc, targetId);
    }

    function ensureWorkflowGraph(targetId) {
      if (!targetId) {
        state.workflowGraphTargetId = null;
        state.workflowGraph = null;
        state.selectedWorkflowNodeId = null;
        state.selectedWorkflowEdgeKey = null;
        state.workflowLinkFromNodeId = null;
        return null;
      }
      if (state.workflowGraph && state.workflowGraphTargetId === targetId) return state.workflowGraph;
      state.workflowGraphTargetId = targetId;
      state.workflowGraph = buildWorkflowGraph(targetId);
      state.selectedWorkflowNodeId = state.workflowGraph.startNodeId || state.workflowGraph.nodes[0]?.id || null;
      state.selectedWorkflowEdgeKey = null;
      state.workflowLinkFromNodeId = null;
      return state.workflowGraph;
    }

    function getSelectedWorkflowNode() {
      return state.workflowGraph?.nodes?.find((node) => node.id === state.selectedWorkflowNodeId) || null;
    }

    function getSelectedWorkflowEdge() {
      return state.workflowGraph?.edges?.find((edge) => edge.key === state.selectedWorkflowEdgeKey) || null;
    }

    function serializeWorkflowGraph(targetId, graph) {
      return serializeWorkflowGraphModel(state.teamStateDoc, targetId, graph);
    }

    function queueWorkflowDoc(doc, targetId) {
      state.pendingChanges['team-state-machines'] = {
        target: 'team-state-machines',
        doc,
        desc: `${targetId} 团队流程设计器`,
      };
    }

    async function fetchJSON(path) {
      const res = await fetch(`${API}${path}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function postJSON(path, payload) {
      const res = await fetch(`${API}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function putJSON(path, payload) {
      const res = await fetch(`${API}${path}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function fmtTime(v) {
      return new Date(v || Date.now()).toLocaleString('zh-CN');
    }

    function markerDefs(svg) {
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      defs.innerHTML = `
        <marker id="arrow-main" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 z" fill="#84af99"></path>
        </marker>
        <marker id="arrow-warn" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 z" fill="#b27a37"></path>
        </marker>
        <marker id="arrow-danger" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 z" fill="#b9513f"></path>
        </marker>
      `;
      svg.appendChild(defs);
    }

    function createStage(width, height) {
      const body = document.getElementById('mainBody');
      body.innerHTML = `
        <div class="stage-scroll">
          <div class="stage-inner" id="stageInner" style="width:${width}px;height:${height}px;">
            <svg id="edges" viewBox="0 0 ${width} ${height}"></svg>
          </div>
        </div>
      `;
      const inner = document.getElementById('stageInner');
      const svg = document.getElementById('edges');
      markerDefs(svg);
      return { inner, svg };
    }

    function addNode(inner, cfg) {
      const el = document.createElement('div');
      el.className = `node ${cfg.kind || ''} ${cfg.state || ''}`.trim();
      el.style.left = `${cfg.x}px`;
      el.style.top = `${cfg.y}px`;
      el.style.width = `${cfg.w || 190}px`;
      el.style.minHeight = `${cfg.h || 78}px`;
      el.innerHTML = `
        <div class="title">${safe(cfg.title)}</div>
        <div class="sub">${safe(cfg.sub)}</div>
        ${cfg.badge ? `<span class="badge">${safe(cfg.badge)}</span>` : ''}
      `;
      inner.appendChild(el);
      return { el, x: cfg.x, y: cfg.y, w: cfg.w || 190, h: cfg.h || 78 };
    }

    function drawCurve(svg, from, to, opts = {}) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const x1 = from.x + from.w;
      const y1 = from.y + from.h / 2;
      const x2 = to.x;
      const y2 = to.y + to.h / 2;
      const dx = Math.max(40, Math.abs(x2 - x1) * 0.45);
      const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', opts.stroke || '#84af99');
      path.setAttribute('stroke-width', opts.width || '2');
      if (opts.dashed) path.setAttribute('stroke-dasharray', '6 4');
      path.setAttribute('marker-end', `url(#${opts.marker || 'arrow-main'})`);
      svg.appendChild(path);
    }

    function drawDown(svg, from, to, opts = {}) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const x1 = from.x + from.w / 2;
      const y1 = from.y + from.h;
      const x2 = to.x + to.w / 2;
      const y2 = to.y;
      const midY = y1 + Math.max(16, (y2 - y1) * 0.45);
      const d = `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', opts.stroke || '#84af99');
      path.setAttribute('stroke-width', opts.width || '1.8');
      if (opts.dashed) path.setAttribute('stroke-dasharray', '6 4');
      path.setAttribute('marker-end', `url(#${opts.marker || 'arrow-main'})`);
      svg.appendChild(path);
    }

    function statusStyle(status) {
      if (status === 'completed') return { cls: 'done', label: '已完成' };
      if (status === 'in_progress') return { cls: 'active', label: '进行中' };
      return { cls: 'pending', label: '待开始' };
    }

    function renderFlowMap() {
      const detail = state.flowDetail;
      if (!detail || !Array.isArray(detail.steps) || !detail.steps.length) {
        document.getElementById('mainBody').innerHTML = '<div class="placeholder">当前流程暂无可渲染步骤。</div>';
        return;
      }

      const steps = detail.steps;
      const cols = Math.min(4, Math.max(2, Math.ceil(Math.sqrt(steps.length))));
      const rows = Math.ceil(steps.length / cols);

      const teamFlow = (detail.metadata && Array.isArray(detail.metadata.team_flow)) ? detail.metadata.team_flow : [];
      const laneHeight = teamFlow.length > 0 ? 150 : 20;

      const width = Math.max(980, cols * 270 + 120, teamFlow.length * 210 + 120);
      const height = Math.max(540, rows * 180 + 120 + laneHeight);

      const { inner, svg } = createStage(width, height);
      const nodes = [];
      const mapByStageName = {};

      steps.forEach((step, idx) => {
        const row = Math.floor(idx / cols);
        const col = idx % cols;
        const st = statusStyle(step.status);
        const node = addNode(inner, {
          x: 54 + col * 250,
          y: 48 + row * 170,
          w: 216,
          h: 96,
          kind: 'flow',
          state: st.cls,
          title: `${safe(step.step)}. ${safe(step.name)}`,
          sub: `team=${safe(step.team)} · role=${safe(step.owner_role || '-')}`,
          badge: `${st.label} · ${safe(step.owner_agent || '-')}`,
        });
        nodes.push(node);
        mapByStageName[String(step.name || '')] = node;
      });

      for (let i = 0; i < nodes.length - 1; i += 1) {
        const n1 = nodes[i];
        const n2 = nodes[i + 1];
        const sameRow = Math.abs(n1.y - n2.y) < 8;
        if (sameRow) {
          drawCurve(svg, n1, n2, { stroke: '#84af99', marker: 'arrow-main' });
        } else {
          drawDown(svg, n1, n2, { stroke: '#84af99', marker: 'arrow-main' });
        }
      }

      const reworkEdges = detail.rework_edges || [];
      reworkEdges.forEach((e) => {
        const from = mapByStageName[String(e.from || '')];
        const to = mapByStageName[String(e.to || '')];
        if (!from || !to) return;
        drawCurve(svg, from, to, {
          stroke: e.type === 'rework' ? '#b9513f' : '#b27a37',
          marker: e.type === 'rework' ? 'arrow-danger' : 'arrow-warn',
          dashed: true,
          width: '2.1',
        });
      });

      if (teamFlow.length > 0) {
        const laneY = height - 122;
        const laneNodes = [];
        teamFlow.forEach((team, i) => {
          laneNodes.push(
            addNode(inner, {
              x: 54 + i * 206,
              y: laneY,
              w: 178,
              h: 72,
              kind: 'team-lane',
              title: team,
              sub: 'team_flow',
              badge: i === 0 ? '入口团队' : (i === teamFlow.length - 1 ? '出口团队' : '流转团队'),
            })
          );
        });

        for (let i = 0; i < laneNodes.length - 1; i += 1) {
          drawCurve(svg, laneNodes[i], laneNodes[i + 1], { stroke: '#b27a37', marker: 'arrow-warn', dashed: true });
        }
      }
    }

    function renderArchitectureMap() {
      const arch = state.architecture;
      if (!arch) {
        document.getElementById('mainBody').innerHTML = '<div class="placeholder">架构数据加载失败。</div>';
        return;
      }

      const teams = arch.teams || [];
      const standalone = arch.standalone_agents || [];
      const columns = Math.max(teams.length, 1);
      const teamGap = 230;
      const startX = 46;
      const topY = 40;
      const memberGapY = 88;

      const maxVisiblePerTeam = 6;
      const maxMemberRows = Math.max(1, ...teams.map((t) => Math.min(maxVisiblePerTeam, (t.members || []).length + (((t.members || []).length > maxVisiblePerTeam) ? 1 : 0))));

      const width = Math.max(1080, startX * 2 + columns * teamGap + 120);
      const height = Math.max(620, 140 + maxMemberRows * memberGapY + (standalone.length ? 140 : 30));

      const { inner, svg } = createStage(width, height);
      const teamNodes = {};
      const standaloneNodes = {};

      const makeSelectable = (node, type, objectId) => {
        node.el.classList.add('clickable');
        node.el.dataset.objectType = type;
        node.el.dataset.objectId = objectId;
        if (state.selectedObjectType === type && state.selectedObjectId === objectId) {
          node.el.classList.add('selected');
        }
        node.el.addEventListener('click', () => {
          setSelectedObject(type, objectId);
          renderAll();
        });
      };

      teams.forEach((team, idx) => {
        const x = startX + idx * teamGap;
        const teamNode = addNode(inner, {
          x,
          y: topY,
          w: 198,
          h: 76,
          kind: 'team',
          title: team.team_name,
          sub: team.team_id,
          badge: `成员 ${team.members ? team.members.length : 0}`,
        });
        teamNodes[team.team_id] = teamNode;
        makeSelectable(teamNode, 'team', team.team_id);

        const members = team.members || [];
        const visible = members.slice(0, maxVisiblePerTeam);
        const overflow = members.length - visible.length;

        visible.forEach((m, i) => {
          const mNode = addNode(inner, {
            x,
            y: topY + 102 + i * memberGapY,
            w: 198,
            h: 74,
            title: m.name,
            sub: `${m.agent_id} · ${safe(m.health?.status || '-')}`,
            badge: m.model || m.primary_model || 'unknown',
          });
          makeSelectable(mNode, 'member', m.agent_id);
          drawDown(svg, teamNode, mNode, { stroke: '#8bad9a' });
        });

        if (overflow > 0) {
          const extraNode = addNode(inner, {
            x,
            y: topY + 102 + visible.length * memberGapY,
            w: 198,
            h: 64,
            title: `+${overflow} 个成员未展开`,
            sub: team.team_id,
            badge: '聚合显示',
          });
          drawDown(svg, teamNode, extraNode, { stroke: '#8bad9a', dashed: true });
        }
      });

      const businessEdges = (arch.edges || []).filter((e) => e.type === 'business_flow');
      businessEdges.forEach((edge) => {
        const from = teamNodes[edge.from];
        const to = teamNodes[edge.to];
        if (!from || !to) return;
        drawCurve(svg, from, to, { stroke: '#b27a37', marker: 'arrow-warn', dashed: true, width: '2.1' });
      });

      if (standalone.length) {
        const rowY = height - 98;
        const maxStandalone = 8;
        const visible = standalone.slice(0, maxStandalone);
        visible.forEach((a, i) => {
          const node = addNode(inner, {
            x: startX + i * 124,
            y: rowY,
            w: 118,
            h: 64,
            title: a.name,
            sub: a.agent_id,
            badge: '独立',
          });
          standaloneNodes[a.agent_id] = node;
          makeSelectable(node, 'agent', a.agent_id);
        });

        if (standalone.length > maxStandalone) {
          addNode(inner, {
            x: startX + maxStandalone * 124,
            y: rowY,
            w: 124,
            h: 64,
            title: `+${standalone.length - maxStandalone}`,
            sub: 'standalone',
            badge: '更多独立Agent',
          });
        }
      }

      const collabEdges = (arch.edges || []).filter((e) => e.type === 'standalone_collab');
      collabEdges.forEach((edge) => {
        const from = standaloneNodes[edge.from];
        const to = teamNodes[edge.to];
        if (!from || !to) return;
        drawCurve(svg, from, to, { stroke: '#2e6f9a', marker: 'arrow-main', dashed: true, width: '2' });
      });

      renderArchitectureContext();
    }

    function renderArchitectureContext() {
      const contextPanel = document.getElementById('contextPanel');
      const flowList = document.getElementById('flowList');
      const flowContext = document.getElementById('flowContext');
      const contextTitle = document.getElementById('contextTitle');
      const contextMeta = document.getElementById('contextMeta');
      if (!contextPanel || !flowList || !flowContext || !contextTitle || !contextMeta) return;
      contextPanel.style.display = '';
      flowList.style.display = 'block';
      flowList.innerHTML = '<div class="object-list-note">点击架构关系图中的团队、成员或独立 Agent，先看对象详情，再决定是否进入治理或配置。</div>';
      contextTitle.textContent = '对象详情';
      contextMeta.textContent = '从架构关系图选择对象后，这里会说明你点的是谁、实际会改谁、会影响什么。';

      const meta = getSelectedObjectMeta();
      if (!meta) {
        flowContext.innerHTML = `
          <section class="card">
            <h4>未选中对象</h4>
            <div style="font-size:13px;color:var(--muted);line-height:1.6;">请先从左侧架构关系图选择一个团队、成员或独立 Agent。系统会先展示对象详情，再决定是否进入治理或高级配置。</div>
          </section>
        `;
        return;
      }

      const targetTeam = meta.editable?.targetId ? getArchitectureIndex().teamById[meta.editable.targetId] : null;
      const categories = getRelevantConfigGroups(meta);
      const categoryLabels = {
        'team-leads': '团队负责人',
        'team-state-machines': '团队流程状态机',
        'patch-from-prompt': '治理提示词补丁',
        'publish-queue': '发布队列',
      };
      flowContext.innerHTML = `
        <section class="card">
          <h4>${safe(meta.name)}</h4>
          <div class="object-kv">
            <div class="k">对象类型</div><div>${objectTypeLabel(meta.type)}</div>
            <div class="k">对象 ID</div><div class="mono">${safe(meta.id)}</div>
            <div class="k">当前归属</div><div>${safe(meta.currentTeamName || meta.currentTeamId || '未归属')}</div>
            <div class="k">当前可编辑对象</div><div>${targetTeam ? `${safe(targetTeam.team_name)}（${safe(targetTeam.team_id)}）` : '当前无独立底层配置'}</div>
            <div class="k">影响配置</div><div>${categories.length ? categories.map((key) => categoryLabels[key]).join('、') : '当前仅支持查看说明'}</div>
          </div>
        </section>
        <section class="card">
          <h4>编辑落点说明</h4>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;">${safe(meta.editable?.reason || '当前对象没有可编辑的底层配置。')}</div>
        </section>
        <section class="card">
          <h4>操作入口</h4>
          <div class="row-actions">

            verdictInput.value = 'approved';
            findingsInput.value = 'architecture validated;handoff constraints preserved';
          } else if (preset === 'critic') {
            reviewerInput.value = 'braintrust_critic';
            verdictInput.value = 'needs_rework';
            findingsInput.value = 'critical gap found;handoff risk remains';
          } else if (preset === 'innovator') {
            reviewerInput.value = 'braintrust_innovator';
            verdictInput.value = 'approved_with_conditions';
            findingsInput.value = 'innovation opportunity noted;apply after current handoff stabilizes';
          }
        });
      });

      document.querySelectorAll('[data-preset-submit]').forEach((el) => {
        el.addEventListener('click', async () => {
          if (!state.selectedReviewId) {
            alert('请先选择审查单');
            return;
          }
          const preset = el.dataset.presetSubmit;
          const reviewerInput = document.getElementById('packetReviewerInput');
          const verdictInput = document.getElementById('packetVerdictInput');
          const findingsInput = document.getElementById('packetFindingsInput');
          if (!reviewerInput || !verdictInput || !findingsInput) return;
          let reviewerId, verdict, findings;
          if (preset === 'architect') {
            reviewerId = 'braintrust_architect';
            verdict = 'approved';
            findings = 'architecture validated;handoff constraints preserved';
          } else if (preset === 'critic') {
            reviewerId = 'braintrust_critic';
            verdict = 'needs_rework';
            findings = 'critical gap found;handoff risk remains';
          } else if (preset === 'innovator') {
            reviewerId = 'braintrust_innovator';
            verdict = 'approved_with_conditions';
            findings = 'innovation opportunity noted;apply after current handoff stabilizes';
          } else return;
          reviewerInput.value = reviewerId;
          verdictInput.value = verdict;
          findingsInput.value = findings;
          try {
            const res = await postJSON(`/api/reviews/${encodeURIComponent(state.selectedReviewId)}/packet`, {
              reviewer_id: reviewerId,
              provider: 'openai',
              verdict,
              findings: findings ? findings.split(';').map((s) => s.trim()).filter(Boolean) : [],
            });
            if (!res.ok) throw new Error(res.error || '提交失败');
            await loadConfigDocs();
            await loadReviewDetail(state.selectedReviewId);
            renderGovernance();
          } catch (e) {
            alert(`提交失败: ${e.message}`);
          }
        });
      });

      if (state.selectedChangeId && document.getElementById('changeDetailPanel')) {
        renderChangeDetail(state.selectedChangeId);
      }
    }

    function workflowCanvasSize(graph) {
      const nodes = graph?.nodes || [];
      const maxX = Math.max(980, ...nodes.map((node) => node.x + 280));
      const maxY = Math.max(560, ...nodes.map((node) => node.y + 190));
      return { width: maxX, height: maxY };
    }

    function workflowEdgePath(graph, edge) {
      const from = graph.nodes.find((node) => node.id === edge.from);
      const to = graph.nodes.find((node) => node.id === edge.to);
      if (!from || !to) return '';
      const x1 = from.x + 210;
      const y1 = from.y + 52;
      const x2 = to.x;
      const y2 = to.y + 52;
      const dx = Math.max(48, Math.abs(x2 - x1) * 0.42);
      return `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
    }

    function attachWorkflowDesignerInteractions(targetId) {
      const graph = ensureWorkflowGraph(targetId);
      if (!graph) return;

      const rerender = () => renderAdvancedConfig();
      const selectedNode = getSelectedWorkflowNode();
      const selectedEdge = getSelectedWorkflowEdge();

      document.querySelectorAll('[data-workflow-node-id]').forEach((el) => {
        el.addEventListener('click', (event) => {
          event.stopPropagation();
          const nodeId = el.dataset.workflowNodeId;
          if (state.workflowLinkFromNodeId && state.workflowLinkFromNodeId !== nodeId) {
            const edgeKey = `${state.workflowLinkFromNodeId}->${nodeId}`;
            const exists = graph.edges.some((edge) => edge.key === edgeKey);
            if (!exists) {
              graph.edges.push({
                key: edgeKey,
                from: state.workflowLinkFromNodeId,
                to: nodeId,
                transitionType: 'normal',
                condition: '通过',
                requiresConfirmation: false,
              });
            }
            state.selectedWorkflowEdgeKey = edgeKey;
            state.selectedWorkflowNodeId = null;
            state.workflowLinkFromNodeId = null;
            rerender();
            return;
          }
          state.selectedWorkflowNodeId = nodeId;
          state.selectedWorkflowEdgeKey = null;
          rerender();
        });

        let startX = 0;
        let startY = 0;
        let originX = 0;
        let originY = 0;
        let dragging = false;
        el.addEventListener('mousedown', (event) => {
          dragging = true;
          startX = event.clientX;
          startY = event.clientY;
          const node = graph.nodes.find((item) => item.id === el.dataset.workflowNodeId);
          if (!node) return;
          originX = node.x;
          originY = node.y;
          el.style.cursor = 'grabbing';
          const onMove = (moveEvent) => {
            if (!dragging) return;
            const dx = moveEvent.clientX - startX;
            const dy = moveEvent.clientY - startY;
            node.x = Math.max(24, originX + dx);
            node.y = Math.max(24, originY + dy);
            el.style.left = `${node.x}px`;
            el.style.top = `${node.y}px`;
          };
          const onUp = () => {
            dragging = false;
            el.style.cursor = 'grab';
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            rerender();
          };
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        });
      });

      document.querySelectorAll('[data-edge-key]').forEach((el) => {
        el.addEventListener('click', () => {
          state.selectedWorkflowEdgeKey = el.dataset.edgeKey;
          state.selectedWorkflowNodeId = null;
          rerender();
        });
      });

      document.getElementById('addWorkflowNodeBtn')?.addEventListener('click', () => {
        const existing = new Set(graph.nodes.map((node) => node.id));
        let idx = graph.nodes.length + 1;
        let nextId = `STAGE_${idx}`;
        while (existing.has(nextId)) {
          idx += 1;
          nextId = `STAGE_${idx}`;
        }
        graph.nodes.push({
          id: nextId,
          label: nextId,
          unifiedState: 'RUNNING',
          role: '',
          description: '',
          x: 72 + (graph.nodes.length % 4) * 240,
          y: 76 + Math.floor(graph.nodes.length / 4) * 168,
          heartbeatInterval: graph.defaults.intervalSeconds,
          heartbeatTimeout: graph.defaults.timeoutThresholdSeconds,
          isStart: false,
          isTerminal: false,
        });
        state.selectedWorkflowNodeId = nextId;
        state.selectedWorkflowEdgeKey = null;
        rerender();
      });

      document.getElementById('deleteWorkflowNodeBtn')?.addEventListener('click', () => {
        if (!selectedNode) return;
        graph.nodes = graph.nodes.filter((node) => node.id !== selectedNode.id);
        graph.edges = graph.edges.filter((edge) => edge.from !== selectedNode.id && edge.to !== selectedNode.id);
        if (graph.startNodeId === selectedNode.id) graph.startNodeId = graph.nodes[0]?.id || null;
        state.selectedWorkflowNodeId = graph.nodes[0]?.id || null;
        state.selectedWorkflowEdgeKey = null;
        rerender();
      });

      document.getElementById('startLinkModeBtn')?.addEventListener('click', () => {
        if (!selectedNode) return;
        state.workflowLinkFromNodeId = state.workflowLinkFromNodeId === selectedNode.id ? null : selectedNode.id;
        rerender();
      });

      document.getElementById('workflowNodeNameInput')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        const nextId = normalizeStateId(event.target.value);
        if (nextId !== selectedNode.id && graph.nodes.some((node) => node.id === nextId)) {
          alert('阶段名称重复，请更换。');
          event.target.value = selectedNode.id;
          return;
        }
        const oldId = selectedNode.id;
        selectedNode.id = nextId;
        selectedNode.label = nextId;
        graph.edges.forEach((edge) => {
          if (edge.from === oldId) edge.from = nextId;
          if (edge.to === oldId) edge.to = nextId;
          edge.key = `${edge.from}->${edge.to}`;
        });
        if (graph.startNodeId === oldId) graph.startNodeId = nextId;
        graph.nodes.forEach((node) => {
          if (node !== selectedNode && node.id === nextId) node.id = normalizeStateId(`${nextId}_${Math.random().toString(36).slice(2,4)}`);
        });
        state.selectedWorkflowNodeId = nextId;
        rerender();
      });

      document.getElementById('workflowNodeUnifiedSelect')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        selectedNode.unifiedState = event.target.value;
      });
      document.getElementById('workflowNodeRoleInput')?.addEventListener('input', (event) => {
        if (!selectedNode) return;
        selectedNode.role = event.target.value;
      });
      document.getElementById('workflowNodeDescInput')?.addEventListener('input', (event) => {
        if (!selectedNode) return;
        selectedNode.description = event.target.value;
      });
      document.getElementById('workflowNodeHeartbeatInput')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        selectedNode.heartbeatInterval = Math.max(30, Number(event.target.value || graph.defaults.intervalSeconds));
      });
      document.getElementById('workflowNodeTimeoutInput')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        selectedNode.heartbeatTimeout = Math.max(60, Number(event.target.value || graph.defaults.timeoutThresholdSeconds));
      });
      document.getElementById('workflowNodeStartCk')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        graph.nodes.forEach((node) => { node.isStart = false; });
        selectedNode.isStart = Boolean(event.target.checked);
        graph.startNodeId = event.target.checked ? selectedNode.id : (graph.nodes[0]?.id || null);
        rerender();
      });
      document.getElementById('workflowNodeTerminalCk')?.addEventListener('change', (event) => {
        if (!selectedNode) return;
        selectedNode.isTerminal = Boolean(event.target.checked);
      });

      document.getElementById('edgeTypeSelect')?.addEventListener('change', (event) => {
        if (!selectedEdge) return;
        selectedEdge.transitionType = event.target.value;
      });
      document.getElementById('edgeConditionSelect')?.addEventListener('change', (event) => {
        if (!selectedEdge) return;
        selectedEdge.condition = event.target.value;
      });
      document.getElementById('edgeConfirmCk')?.addEventListener('change', (event) => {
        if (!selectedEdge) return;
        selectedEdge.requiresConfirmation = Boolean(event.target.checked);
      });
      document.getElementById('deleteWorkflowEdgeBtn')?.addEventListener('click', () => {
        if (!selectedEdge) return;
        graph.edges = graph.edges.filter((edge) => edge.key !== selectedEdge.key);
        state.selectedWorkflowEdgeKey = null;
        rerender();
      });

      document.getElementById('saveWorkflowDraftBtn')?.addEventListener('click', async () => {
        const issues = validateWorkflowGraph(graph);
        if (issues.length) {
          alert(`流程图校验失败：\n- ${issues.join('\n- ')}`);
          return;
        }
        try {
          const doc = serializeWorkflowGraph(targetId, graph);
          const res = await putJSON('/api/config/team-state-machines', { doc, operator: 'dashboard-ui' });
          if (!res.ok) throw new Error(res.error || '保存失败');
          state.teamStateDoc = doc;
          state.workflowGraph = buildWorkflowGraph(targetId);
          alert(`流程草稿已保存\nbackup: ${safe(res.backup)}`);
          rerender();
        } catch (e) {
          alert(`保存失败: ${e.message}`);
        }
      });

      document.getElementById('queueWorkflowBtn')?.addEventListener('click', () => {
        const issues = validateWorkflowGraph(graph);
        if (issues.length) {
          alert(`流程图校验失败：\n- ${issues.join('\n- ')}`);
          return;
        }
        const doc = serializeWorkflowGraph(targetId, graph);
        queueWorkflowDoc(doc, targetId);
        rerender();
      });

      document.getElementById('publishWorkflowBtn')?.addEventListener('click', async () => {
        const issues = validateWorkflowGraph(graph);
        if (issues.length) {
          alert(`流程图校验失败：\n- ${issues.join('\n- ')}`);
          return;
        }
        const queuedDoc = serializeWorkflowGraph(targetId, graph);
        queuedDoc.metadata = queuedDoc.metadata || {};
        queuedDoc.metadata.last_published_at = new Date().toISOString();
        queueWorkflowDoc(queuedDoc, targetId);
        try {
          const changes = Object.values(state.pendingChanges);
          const res = await postJSON('/api/config/publish', { changes, restart_gateway: false, operator: 'dashboard-ui' });
          if (!res.ok) throw new Error(res.error || '发布失败');
          state.pendingChanges = {};
          await loadConfigDocs();
          state.workflowGraph = buildWorkflowGraph(targetId);
          alert(`发布成功\nbackup: ${safe(res.backup)}\nrestart_done: ${safe(res.restart_done)}`);
          rerender();
        } catch (e) {
          alert(`发布失败: ${e.message}`);
        }
      });
    }

            <span class="chip">${flowTypeLabel(f.flow_type)}</span>

          <div class="d">${safe(f.description)}</div>

          await loadFlowDetail();
          renderAll();
        });

    function renderTabs() {
      document.querySelectorAll('.tab[data-view]').forEach((tab) => {
        if (tab.dataset.view === state.view) tab.classList.add('active');
        else tab.classList.remove('active');
      });

      renderTabs();
      renderSidebarStats();

    async function loadFlowDetail() {
      if (!state.selectedFlowId) {
        state.flowDetail = null;
        return;
      }
      const detail = await fetchJSON(`/api/flow/detail?flow_id=${encodeURIComponent(state.selectedFlowId)}`);
      state.flowDetail = detail.error ? null : detail;
    }

    async function loadConfigDocs() {
      const [teamLeadsRes, teamStateRes, runtimeVersionRes, changeTaskRes, reviewTaskRes] = await Promise.all([
        fetchJSON('/api/config/team-leads'),
        fetchJSON('/api/config/team-state-machines'),
        fetchJSON('/api/runtime-versions'),
        fetchJSON('/api/change-tasks'),
        fetchJSON('/api/reviews'),
      ]);
      state.teamLeadsDoc = teamLeadsRes.doc || null;
      state.teamStateDoc = teamStateRes.doc || null;
      state.runtimeVersions = runtimeVersionRes || {};
      state.changeTasks = changeTaskRes.changes || [];
      state.reviewTasks = reviewTaskRes.reviews || [];
      if (state.selectedChangeId && !state.changeTasks.some((item) => item.change_id === state.selectedChangeId)) {
        state.selectedChangeId = null;
        syncRouteState();
      }
      if (state.selectedReviewId && !state.reviewTasks.some((item) => item.review_id === state.selectedReviewId)) {
        state.selectedReviewId = null;
        state.reviewDetail = null;
        syncRouteState();
      }
    }

    async function loadReviewDetail(reviewId) {
      if (!reviewId) {
        state.selectedReviewId = null;
        state.reviewDetail = null;
        syncRouteState();
        return;
      }
      const res = await fetchJSON(`/api/reviews/${encodeURIComponent(reviewId)}`);
      state.selectedReviewId = reviewId;
      state.reviewDetail = res && !res.error ? res : null;
      state.view = 'governance';
      state.governanceView = 'review';
      syncRouteState();
    }

    function applyRouteFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const subview = params.get('subview');
      const governance = params.get('governance');
      const reviewId = params.get('review_id');
      const changeId = params.get('change_id');
      const objectType = params.get('object_type');
      const objectId = params.get('object_id');
      const targetType = params.get('target_type');
      const targetId = params.get('target_id');
      const mode = params.get('mode');
      state.selectedObjectType = objectType || null;
      state.selectedObjectId = objectId || null;
      state.selectedTargetType = targetType || null;
      state.selectedTargetId = targetId || null;
      state.advancedConfigMode = mode || 'workflow-designer';
      if (subview === 'advanced-config') {
        state.view = 'advanced-config';
        return;
      }
      if (subview === 'architecture') {
        state.view = 'architecture-map';
        return;
      }
      if (subview === 'governance' && !governance) {
        state.view = 'governance';
        state.governanceView = 'change';
        return;
      }
      if (governance === 'review') {
        state.view = 'governance';
        state.governanceView = 'review';
        if (reviewId) state.selectedReviewId = reviewId;
      } else if (governance === 'change') {
        state.view = 'governance';
        state.governanceView = 'change';
        if (changeId) state.selectedChangeId = changeId;
      } else if (governance === 'recovery') {
        state.view = 'governance';
        state.governanceView = 'recovery';
      }
    }

    function syncRouteState() {
      const url = new URL(window.location.href);
      if (state.view === 'architecture-map') {
        url.searchParams.set('subview', 'architecture');
        url.searchParams.delete('governance');
        url.searchParams.delete('review_id');
        url.searchParams.delete('change_id');
        if (state.selectedObjectType && state.selectedObjectId) {
          url.searchParams.set('object_type', state.selectedObjectType);
          url.searchParams.set('object_id', state.selectedObjectId);
        } else {
          url.searchParams.delete('object_type');
          url.searchParams.delete('object_id');
        }
        url.searchParams.delete('target_type');
        url.searchParams.delete('target_id');
      } else if (state.view === 'advanced-config') {
        url.searchParams.set('subview', 'advanced-config');
        url.searchParams.set('mode', state.advancedConfigMode || 'workflow-designer');
        url.searchParams.delete('governance');
        url.searchParams.delete('review_id');
        url.searchParams.delete('change_id');
        if (state.selectedObjectType && state.selectedObjectId) {
          url.searchParams.set('object_type', state.selectedObjectType);
          url.searchParams.set('object_id', state.selectedObjectId);
        } else {
          url.searchParams.delete('object_type');
          url.searchParams.delete('object_id');
        }
        if (state.selectedTargetType && state.selectedTargetId) {
          url.searchParams.set('target_type', state.selectedTargetType);
          url.searchParams.set('target_id', state.selectedTargetId);
        } else {
          url.searchParams.delete('target_type');
          url.searchParams.delete('target_id');
        }
      } else if (state.view === 'governance' && state.governanceView === 'review') {
        url.searchParams.set('subview', 'governance');
        url.searchParams.set('governance', 'review');
        if (state.selectedReviewId) url.searchParams.set('review_id', state.selectedReviewId);
        else url.searchParams.delete('review_id');
        url.searchParams.delete('change_id');
        url.searchParams.delete('object_type');
        url.searchParams.delete('object_id');
        url.searchParams.delete('target_type');
        url.searchParams.delete('target_id');
        url.searchParams.delete('mode');
      } else if (state.view === 'governance' && state.governanceView === 'change') {
        url.searchParams.set('subview', 'governance');
        url.searchParams.set('governance', 'change');
        if (state.selectedChangeId) url.searchParams.set('change_id', state.selectedChangeId);
        else url.searchParams.delete('change_id');
        url.searchParams.delete('review_id');
        url.searchParams.delete('object_type');
        url.searchParams.delete('object_id');
        url.searchParams.delete('target_type');
        url.searchParams.delete('target_id');
        url.searchParams.delete('mode');
      } else if (state.view === 'governance' && state.governanceView === 'recovery') {
        url.searchParams.set('subview', 'governance');
        url.searchParams.set('governance', 'recovery');
        url.searchParams.delete('review_id');
        url.searchParams.delete('change_id');
        url.searchParams.delete('object_type');
        url.searchParams.delete('object_id');
        url.searchParams.delete('target_type');
        url.searchParams.delete('target_id');
        url.searchParams.delete('mode');
      } else {
        url.searchParams.set('subview', 'architecture');
        url.searchParams.delete('governance');
        url.searchParams.delete('review_id');
        url.searchParams.delete('change_id');
        url.searchParams.delete('object_type');
        url.searchParams.delete('object_id');
        url.searchParams.delete('target_type');
        url.searchParams.delete('target_id');
        url.searchParams.delete('mode');
      }
      window.history.replaceState({}, '', url);
    }

    async function renderChangeDetail(changeId) {
      const panel = document.getElementById('changeDetailPanel');
      if (!panel) return;
      panel.innerHTML = '<div class="warn-text">加载中…</div>';
      try {
        const c = await fetchJSON(`/api/change-tasks/${encodeURIComponent(changeId)}`);
        state.selectedChangeId = changeId;
        state.view = 'governance';
        state.governanceView = 'change';
        syncRouteState();
        const auditList = c.publish_audit || [];
        const impactTargets = Array.isArray(c.impact_targets) ? c.impact_targets : (c.impact_targets ? [c.impact_targets] : []);
        const atRisk = Array.isArray(c.at_risk_tasks) ? c.at_risk_tasks : (c.at_risk_tasks ? [c.at_risk_tasks] : []);
        panel.innerHTML = `
          <div class="mono" style="margin-bottom:8px;">${safe(c.change_id)} · ${safe(c.scope)} · ${safe(c.status)}</div>
          <div style="font-weight:700;margin-bottom:6px;">${safe(c.title)}</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:10px;">${safe(c.description || '-')}</div>
          <div class="row-actions" style="margin-bottom:10px;">
            <a href="task_dashboard.html${atRisk.length ? `?task_id=${encodeURIComponent(atRisk[0])}` : '?pool=governance_pool'}" class="btn" target="_blank" rel="noopener">在任务中心查看</a>
          </div>
          <div class="collapsible-section" style="margin-top:10px;">
            <strong>影响范围</strong>
            <div class="mono">impact_targets: ${safe(impactTargets.join(', ') || '-')}</div>
            <div class="mono">at_risk_tasks: ${safe(atRisk.join(', ') || '-')}</div>
          </div>
          <div class="collapsible-section" style="margin-top:8px;">
            <strong>回滚计划</strong>
            <div class="mono">${safe(c.rollback_plan || '-')}</div>
          </div>
          <div class="collapsible-section" style="margin-top:8px;">
            <strong>审批</strong>
            <div class="mono">${c.approval ? `已审批 · ${safe(c.approval.approved_by)} · ${safe(c.approval.approved_at)}` : '未审批'}</div>
          </div>
          <div style="margin-top:12px;">
            <strong>发布审计</strong>
            ${auditList.length ? `<ul>${auditList.map((a) => `<li class="mono">${safe(a.published_at)} · ${safe(a.published_by)} · workflow=${safe(a.versions?.workflow_version)} · routing=${safe(a.versions?.routing_version)}${a.p0_override ? ' · P0 override' : ''}</li>`).join('')}</ul>` : '<div class="warn-text">暂无发布记录</div>'}
          </div>
          <div class="row-actions" style="margin-top:12px;">
            <button class="btn" data-approve-change="${safe(changeId)}">审批变更</button>
            <button class="btn primary" data-publish-change="${safe(changeId)}">发布变更</button>
          </div>
        `;
        panel.querySelectorAll('[data-approve-change]').forEach((el) => {
          el.addEventListener('click', async () => {
            try {
              const res = await postJSON(`/api/change-tasks/${encodeURIComponent(changeId)}/approve`, { actor_id: 'braintrust_chief', actor_role: 'admin' });
              if (!res.ok) throw new Error(res.error || '审批失败');
              await renderChangeDetail(changeId);
              await loadConfigDocs();
              renderGovernance();
            } catch (e) {
              alert(`审批失败: ${e.message}`);
            }
          });
        });
        panel.querySelectorAll('[data-publish-change]').forEach((el) => {
          el.addEventListener('click', async () => {
            try {
              const res = await postJSON(`/api/change-tasks/${encodeURIComponent(changeId)}/publish`, { actor_id: 'luban', actor_role: 'admin' });
              if (!res.ok) throw new Error(res.error || '发布失败');
              await loadConfigDocs();
              await loadAllData();
              await renderChangeDetail(changeId);
              renderGovernance();
            } catch (e) {
              alert(`发布失败: ${e.message}`);
            }
          });
        });
      } catch (e) {
        panel.innerHTML = `<div class="danger-text">加载失败: ${safe(e.message)}</div>`;
      }
    }

    async function loadAllData() {
      const [archRes, flowRes] = await Promise.all([
        fetchJSON('/api/architecture'),
        fetchJSON('/api/flows'),
      ]);

      state.architecture = archRes;
      state.flows = flowRes.flows || [];
      state.updatedAt = archRes.updated_at || flowRes.updated_at || Date.now();

      if (!state.selectedFlowId || !state.flows.some((f) => f.flow_id === state.selectedFlowId)) {
        state.selectedFlowId = state.flows.length ? state.flows[0].flow_id : null;
      }

      if (state.selectedObjectType && state.selectedObjectId) {
        const meta = getSelectedObjectMeta();
        if (!meta) clearSelectedObject();
        else syncEditableTargetFromSelection();
      }

      await Promise.all([loadFlowDetail(), loadConfigDocs()]);
    }

    async function refresh() {
      await loadAllData();
      renderAll();
    }

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      try {
        await refresh();
      } catch (err) {
        alert(`刷新失败: ${err.message}`);
      }
    });

    document.querySelectorAll('.tab[data-view]').forEach((tab) => {
      tab.addEventListener('click', () => {
        state.view = tab.dataset.view;
        if (state.view === 'governance' && !state.governanceView) state.governanceView = 'change';
        syncRouteState();
        renderAll();
      });
    });

    window.addEventListener('resize', () => {
      if (state.architecture) renderMainPanel();
    });

    (async () => {
      try {
        applyRouteFromQuery();
        await refresh();
        applyRouteFromQuery();
        if (state.selectedReviewId) await loadReviewDetail(state.selectedReviewId);
        if (state.selectedChangeId) await renderChangeDetail(state.selectedChangeId);
        applyRouteFromQuery();
        syncRouteState();
        renderAll();
        setInterval(async () => {
          try { await refresh(); } catch (_) {}
        }, 20000);
      } catch (err) {
        console.error(err);
        document.getElementById('mainBody').innerHTML = `<div class="placeholder">页面加载失败：${safe(err.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
