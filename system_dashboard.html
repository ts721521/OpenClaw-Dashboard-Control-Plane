<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw · 系统架构管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eff4ef;
      --panel: #ffffff;
      --ink: #18231d;
      --muted: #5e6f63;
      --line: #d2ddd4;
      --brand: #116346;
      --brand-2: #0e4a36;
      --accent: #bf6e1d;
      --soft: #eef7f2;
      --shadow: 0 12px 30px rgba(16, 35, 24, 0.1);
      --radius: 14px;
      --danger: #b9513f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Manrope, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 540px at -8% -2%, #dbeee2 0%, transparent 66%),
        radial-gradient(1000px 520px at 118% -5%, #f7ead8 0%, transparent 62%),
        var(--bg);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      min-height: 100vh;
      gap: 14px;
      padding: 14px;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(170deg, #f8fcf9 0%, #edf4ef 100%);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
    }

    .brand {
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .menu {
      display: grid;
      gap: 8px;
    }

    .menu a {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .menu a:hover {
      border-color: #8ebea4;
      background: #f1faf4;
    }

    .menu a.active {
      border-color: #7fb497;
      background: linear-gradient(135deg, #e9f7ef 0%, #f7f6ef 100%);
      color: var(--brand);
    }

    .side-stats {
      margin-top: auto;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .side-stat {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
    }

    .side-stat .n {
      font-size: 20px;
      font-weight: 800;
      color: var(--brand);
      line-height: 1.1;
    }

    .side-stat .l {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .main {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
      min-width: 0;
    }

    .top {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 8px 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .top h2 {
      margin: 0;
      font-size: 18px;
    }

    .top p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      background: #fff;
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      border-color: #8cbda2;
      color: var(--brand);
    }

    .btn.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .btn.warn { border-color: #f2d7b4; color: #9e5e19; background: #fff4e6; }

    .tabs {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      padding: 8px;
      display: flex;
      gap: 8px;
      overflow: auto;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fafcfb;
      border-radius: 10px;
      padding: 8px 12px;
      white-space: nowrap;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #385245;
    }

    .tab:hover { border-color: #95c4ab; }

    .tab.active {
      color: var(--brand);
      border-color: #7bb094;
      background: linear-gradient(130deg, #eaf8ef 0%, #f8f5eb 100%);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 12px;
      min-height: 0;
    }
    .grid.grid--full { grid-template-columns: 1fr; }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .head h3 {
      margin: 0;
      font-size: 16px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .stage-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(transparent 23px, rgba(110, 138, 122, 0.09) 24px),
        linear-gradient(90deg, transparent 23px, rgba(110, 138, 122, 0.09) 24px),
        #f8fbf9;
      background-size: 24px 24px;
      position: relative;
    }

    .stage-inner {
      position: relative;
      min-height: 460px;
      min-width: 860px;
    }

    #edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .node {
      position: absolute;
      border: 1px solid #cbd9d0;
      border-radius: 12px;
      background: #fff;
      padding: 9px 10px;
      box-shadow: 0 8px 18px rgba(16, 36, 24, 0.08);
      z-index: 1;
      color: #233428;
    }

    .node .title {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
    }

    .node .sub {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }

    .node .badge {
      display: inline-block;
      margin-top: 5px;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #d2ddd5;
      background: #f4f8f6;
      color: #3f5a4c;
      font-weight: 700;
    }

    .node.done { border-color: #bde0ca; background: #f2fbf6; }
    .node.active { border-color: #b8d9f2; background: #f1f8ff; }
    .node.pending { border-color: #d4ddd5; background: #fbfdfb; }
    .node.clickable { cursor: pointer; }
    .node.clickable:hover {
      border-color: #7bb094;
      box-shadow: 0 12px 24px rgba(16, 36, 24, 0.12);
      transform: translateY(-1px);
    }
    .node.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(17, 99, 70, 0.16), 0 12px 24px rgba(16, 36, 24, 0.14);
    }

    .flow-list {
      overflow: auto;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      min-height: 0;
      flex: 1;
    }

    .flow-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      background: #fff;
    }

    .flow-item:hover { border-color: #95c4ab; }
    .flow-item.active { border-color: #7bb094; background: #f2fbf6; }

    .flow-item .t {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: #1d2a23;
      line-height: 1.3;
    }

    .flow-item .d {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .flow-item .m {
      margin-top: 6px;
      font-size: 11px;
      color: #4f6558;
      font-family: "IBM Plex Mono", monospace;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      padding: 2px 8px;
      color: #355245;
      background: #f7fbf9;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .detail-card {
      padding: 10px;
      display: grid;
      gap: 10px;
      max-height: 42vh;
      overflow: auto;
      background: #fcfefd;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
    }

    .card h4 {
      margin: 0 0 8px;
      font-size: 13px;
    }

    .mono {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      color: #4f6558;
      line-height: 1.35;
    }

    .link-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .link-table th,
    .link-table td {
      border-top: 1px solid var(--line);
      padding: 6px 4px;
      text-align: left;
      vertical-align: top;
    }

    .link-table th {
      color: var(--muted);
      font-weight: 700;
      font-size: 11px;
    }

    .placeholder {
      margin: 12px;
      border: 1px dashed #bfd2c4;
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      color: #5d7365;
      font-size: 13px;
      background: #f8fcf9;
    }

    .governance {
      padding: 12px;
      display: grid;
      gap: 10px;
      overflow: auto;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .editor-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .editor-card h4 { margin: 0; font-size: 14px; }
    .editor-card textarea {
      min-height: 260px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      background: #f9fcfa;
      color: #284136;
      resize: vertical;
    }

    .row-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    .prompt-box textarea {
      min-height: 90px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 8px;
      font-size: 13px;
      background: #f9fcfa;
      color: #284136;
      resize: vertical;
    }

    .queue-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    .warn-text { color: #9e5e19; font-size: 12px; }
    .danger-text { color: var(--danger); font-size: 12px; }

    .change-detail-inner { font-size: 13px; line-height: 1.45; }
    .change-detail-inner .mono { font-size: 11px; }
    .change-detail-inner ul { margin: 8px 0 0 18px; padding: 0; }
    .collapsible-section { margin-top: 10px; }
    .collapsible-section summary { cursor: pointer; font-weight: 700; padding: 6px 0; }
    .collapsible-section[open] summary { margin-bottom: 8px; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .status-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbf9;
      padding: 10px;
    }
    .status-card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .status-card .value {
      font-size: 12px;
      font-weight: 800;
      color: #22342a;
      line-height: 1.35;
    }
    .inline-link {
      font-size: 12px;
      color: var(--brand);
      text-decoration: none;
      font-weight: 700;
    }
    .inline-link:hover { text-decoration: underline; }
    .object-list-note {
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfdfc;
    }
    .object-kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 6px 10px;
      font-size: 12px;
      align-items: start;
    }
    .object-kv .k {
      color: var(--muted);
      font-weight: 700;
    }
    .object-summary {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fbf9;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .config-group {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .config-group summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 14px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #fbfdfc;
    }
    .config-group summary::-webkit-details-marker { display: none; }
    .config-group-body {
      padding: 12px;
      display: grid;
      gap: 10px;
      border-top: 1px solid var(--line);
    }
    .impact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .mode-switch {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .designer-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 12px;
      min-height: 0;
    }
    .designer-stage {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, #f9fcfa 0%, #f0f6f2 100%);
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }
    .designer-toolbar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
    }
    .designer-meta {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      background: rgba(255,255,255,0.6);
    }
    .designer-meta-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      background: #fff;
    }
    .designer-meta-card .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .designer-meta-card .value {
      font-size: 12px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.35;
    }
    .designer-canvas-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(transparent 27px, rgba(79, 101, 88, 0.07) 28px),
        linear-gradient(90deg, transparent 27px, rgba(79, 101, 88, 0.07) 28px),
        linear-gradient(180deg, #f9fcfa 0%, #edf4ef 100%);
      background-size: 28px 28px;
    }
    .designer-canvas {
      position: relative;
      min-width: 980px;
      min-height: 560px;
    }
    .designer-edges {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .workflow-node {
      position: absolute;
      width: 210px;
      min-height: 104px;
      border-radius: 16px;
      border: 1px solid #c6d7cb;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(245,249,246,0.96));
      box-shadow: 0 16px 32px rgba(16, 36, 24, 0.11);
      padding: 12px;
      z-index: 1;
      cursor: grab;
      user-select: none;
    }
    .workflow-node.selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(17, 99, 70, 0.16), 0 18px 34px rgba(16, 36, 24, 0.15);
    }
    .workflow-node.start-node { border-color: #3f8e67; }
    .workflow-node.terminal-node { border-style: dashed; }
    .workflow-node .headline {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .workflow-node .name {
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
      color: #17261f;
      word-break: break-word;
    }
    .workflow-node .body {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      font-size: 11px;
      color: #405549;
    }
    .workflow-node .mini-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .workflow-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      border: 1px solid #d4ddd5;
      background: #f7fbf9;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 700;
      color: #355245;
    }
    .designer-side {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .designer-side .editor-card textarea {
      min-height: 120px;
    }
    .designer-field {
      display: grid;
      gap: 6px;
    }
    .designer-field label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
    }
    .designer-field input,
    .designer-field select,
    .designer-field textarea {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #ccdbd1;
      padding: 10px 12px;
      font: inherit;
      background: #f9fcfa;
      color: #284136;
    }
    .designer-field textarea {
      min-height: 90px;
      resize: vertical;
    }
    .designer-list {
      display: grid;
      gap: 8px;
    }
    .designer-list-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
    }
    .designer-list-item:hover { border-color: #8ebea4; }
    .designer-list-item.selected {
      border-color: var(--brand);
      background: #f2fbf6;
    }
    .designer-error-list {
      margin: 0;
      padding-left: 18px;
      font-size: 12px;
      color: var(--danger);
      display: grid;
      gap: 4px;
    }
    .designer-empty {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }
    .designer-path {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: #486152;
    }

    @media (max-width: 1280px) {
      .grid { grid-template-columns: 1fr; }
      .flow-list { max-height: 300px; }
      .detail-card { max-height: none; }
      .editor-grid { grid-template-columns: 1fr; }
      .designer-shell { grid-template-columns: 1fr; }
      .designer-meta { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .top {
        flex-direction: column;
        align-items: flex-start;
      }
      .actions { justify-content: flex-start; }
      .governance .editor-card { padding: 10px; }
      .governance .row-actions { flex-wrap: wrap; gap: 6px; }
      .governance .collapsible-section summary { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <h1>OpenClaw</h1>
        <p>Dashboard 控制台</p>
      </div>

      <nav class="menu">
        <a href="team_dashboard.html">团队管理中心</a>
        <a href="task_dashboard.html">任务管理中心</a>
        <a class="active" href="system_dashboard.html">系统架构管理中心</a>
      </nav>

      <div class="side-stats" id="sideStats">
        <div class="side-stat"><div class="n">-</div><div class="l">团队总数</div></div>
        <div class="side-stat"><div class="n">-</div><div class="l">流程总数</div></div>
        <div class="side-stat"><div class="n">-</div><div class="l">实时更新时间</div></div>
      </div>
    </aside>

    <main class="main">
      <header class="top" id="topBar">
        <nav class="tabs" id="tabs">
          <button class="tab active" data-view="architecture-map">系统架构关系图</button>
          <button class="tab" data-view="governance">治理中心</button>
          <button class="tab" data-view="advanced-config">高级配置</button>
        </nav>
        <div class="actions">
          <button class="btn primary" id="refreshBtn">刷新数据</button>
        </div>
      </header>

      <section class="grid" id="mainGrid">
        <section class="panel">
          <div class="head">
            <h3 id="mainTitle">系统架构关系图</h3>
