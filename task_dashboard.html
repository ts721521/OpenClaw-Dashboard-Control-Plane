<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw · 任务管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f4;
      --panel: #fff;
      --ink: #1f2a24;
      --muted: #5d6c62;
      --line: #d8dfd8;
      --brand: #0f7b57;
      --brand-2: #145a43;
      --accent: #bf7a2a;
      --ok: #0e9e5a;
      --warn: #cf851d;
      --danger: #be3b33;
      --shadow: 0 8px 24px rgba(15, 35, 24, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Manrope, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 480px at -10% 0%, #e0f1e7 0%, transparent 65%),
        radial-gradient(1200px 480px at 120% 0%, #f7ebdc 0%, transparent 60%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      min-height: 100vh;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(170deg, #f8fcf9 0%, #edf4ef 100%);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
    }

    .brand { border-bottom: 1px solid var(--line); padding-bottom: 12px; }
    .brand h2 { margin: 0; font-size: 20px; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }

    .menu { display: grid; gap: 8px; }
    .menu a {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .menu a:hover { border-color: #8ebea4; background: #f1faf4; }
    .menu a.active {
      border-color: #7fb497;
      background: linear-gradient(135deg, #e9f7ef 0%, #f7f6ef 100%);
      color: var(--brand);
    }

    .main { min-width: 0; }
    .shell { max-width: 1520px; margin: 0 auto; padding: 24px 24px 24px 0; }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 12px;
      margin-bottom: 6px;
    }

    .top .actions { margin-left: auto; display: flex; gap: 8px; }
    .actions { display: flex; gap: 10px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--brand); color: var(--brand); }
    .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; border-color: transparent; }
    .btn.warn { border-color: #f2d7b4; color: #9e5e19; background: #fff4e6; }
    .btn.danger { border-color: #e5bcb8; color: #a43731; background: #fff0ef; }
    .btn:disabled { opacity: .45; cursor: not-allowed; border-color: var(--line); color: var(--muted); background: #f3f5f3; }

    .pool-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
    }

    .pool-tab {
      border: 1px solid #d3ddd6;
      border-radius: 999px;
      background: #f7faf8;
      color: #2f4639;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      cursor: pointer;
    }
    .pool-tab.active {
      border-color: #82b89e;
      background: #ebf8f0;
      color: var(--brand);
    }

    .layout {
      display: grid;
      grid-template-columns: 40% 60%;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .panel .head h2 { margin: 0; font-size: 17px; }
    .head .meta { color: var(--muted); font-size: 12px; }

    .task-list {
      max-height: 72vh;
      overflow: auto;
      padding: 10px;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      background: #fff;
    }

    .task.selected { border-color: #89c4ab; background: #f2fbf6; }
    .task:hover { border-color: #a5ccb9; }
    .task { opacity: 0; transform: translateY(6px); animation: taskFadeIn 0.22s ease forwards; }
    @keyframes taskFadeIn { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .task { animation: none; opacity: 1; transform: none; }
    }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .task h3 { margin: 0; font-size: 14px; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); }

    .badge {
      font-size: 11px;
      border-radius: 999px;
      padding: 3px 9px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .s-completed { background: #e8f8ef; color: #0e8450; border-color: #bde3cc; }
    .s-in_progress { background: #e8f3ff; color: #1563ad; border-color: #bed9f5; }
    .s-pending { background: #fff4e6; color: #9e5e19; border-color: #f2d7b4; }
    .s-unknown { background: #f0f2f0; color: #64756b; border-color: #d7dfd9; }

    .bar {
      margin-top: 8px;
      height: 8px;
      background: #ecf0ec;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill { height: 100%; background: linear-gradient(90deg, var(--brand), #3ea37e); }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .detail {
      padding: 14px;
      max-height: 76vh;
      overflow: auto;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .box h3 { margin: 0 0 8px; font-size: 14px; }

    .k2 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .k2 div { background: #f6f8f6; border-radius: 10px; padding: 8px; border: 1px solid #e3e9e4; }
    .k2 .v { font-weight: 800; color: var(--brand); }
    .k2 .l { font-size: 11px; color: var(--muted); }

    .stage {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      margin: 6px 0;
      background: #fff;
    }

    .stage.done { border-color: #c7e5d5; background: #f4fcf7; }
    .stage.active { border-color: #b7d8f3; background: #f3f9ff; }

    .index {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #edf1ed;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #4d5d54;
    }

    .team-flow { display: flex; flex-wrap: wrap; gap: 8px; }
    .team-link {
      text-decoration: none;
      border: 1px solid #c9d9cf;
      border-radius: 999px;
      padding: 6px 10px;
      color: #2a493a;
      font-size: 12px;
      background: #f4faf6;
    }

    .health { display: inline-flex; align-items: center; gap: 6px; font-weight: 800; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .healthy { background: var(--ok); }
    .warning { background: var(--warn); }
    .stale { background: var(--danger); }
    .unknown { background: #8a988f; }

    .runtime-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #d6e2da;
      background: #f7fbf9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .pulse.running { background: var(--ok); box-shadow: 0 0 0 0 rgba(14, 158, 90, 0.55); animation: pulse 1.4s infinite; }
    .pulse.stalled { background: var(--danger); box-shadow: 0 0 0 0 rgba(190, 59, 51, 0.45); animation: pulse 1.6s infinite; }
    .pulse.idle { background: var(--warn); }
    .pulse.unknown { background: #98a69d; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(14, 158, 90, 0.45); }
      70% { box-shadow: 0 0 0 12px rgba(14, 158, 90, 0); }
      100% { box-shadow: 0 0 0 0 rgba(14, 158, 90, 0); }
    }

    .todo-list { margin: 0; padding-left: 20px; }
    .todo-list li { margin: 6px 0; font-size: 13px; }

    .audit-list { margin: 0; padding-left: 18px; }
    .audit-list li { margin: 6px 0; font-size: 12px; color: var(--muted); }

    .detail-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .empty { color: var(--muted); font-size: 13px; }

    .gate-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .gate-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbf9;
      font-size: 12px;
    }

    .gate-item.warn {
      border-color: #f2d7b4;
      background: #fff6eb;
    }

    .gate-item.danger {
      border-color: #e5bcb8;
      background: #fff1ef;
    }

    .op-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .op-grid textarea,
    .op-grid input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: #fbfdfb;
      color: var(--ink);
    }

    .op-grid textarea {
      min-height: 92px;
      resize: vertical;
      grid-column: 1 / -1;
    }

    .field-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      .side { position: static; height: auto; }
      .shell { padding: 10px 0; }
      .layout { grid-template-columns: 1fr; }
      .task-list { max-height: 44vh; }
    }

    @media (max-width: 820px) {
      .shell { padding: 12px; }
      .k2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .top { align-items: flex-start; }
      .top .actions { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <h2>OpenClaw</h2>
        <p>Dashboard 控制台</p>
      </div>
      <nav class="menu">
        <a href="team_dashboard.html">团队管理中心</a>
        <a class="active" href="task_dashboard.html">任务管理中心</a>
        <a href="system_dashboard.html">系统架构管理中心</a>
      </nav>
    </aside>

    <main class="main">
      <div class="shell">
        <header class="top">
          <nav class="pool-tabs" id="poolTabs">
            <button class="pool-tab active" data-pool="running">运行中</button>
            <button class="pool-tab" data-pool="intake_pool">待拆解池</button>
            <button class="pool-tab" data-pool="team_dispatch_pool">团队领取池</button>
            <button class="pool-tab" data-pool="governance_pool">治理池</button>
            <button class="pool-tab" data-pool="review_pool">审查池</button>
            <button class="pool-tab" data-pool="recovery_pool">恢复池</button>
            <button class="pool-tab" data-pool="completed">已完成</button>
          </nav>
          <div class="actions">
            <label class="btn" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;font-size:12px;">
              <input type="checkbox" id="historyToggle" />
              <span>历史</span>
            </label>
            <button class="btn primary" id="refreshBtn" style="padding:6px 12px;font-size:12px;">刷新</button>
          </div>
        </header>

        <div class="layout">
          <section class="panel">
            <div class="head">
              <h2>任务列表</h2>
              <div class="meta">默认：进行中 · 更新时间：<span id="updatedAt">-</span></div>
            </div>
            <div class="task-list" id="taskList"></div>
          </section>

          <section class="panel">
            <div class="head">
              <h2>任务详情</h2>
              <div class="meta">可直接停止/重启/删除，或跳转会话</div>
            </div>
            <div class="detail" id="detail">
              <div class="empty">请选择左侧任务。</div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="static/task_dashboard_utils.js"></script>
  <script>
    const API = `${window.location.protocol}//${window.location.host}`;
    let currentFilter = 'in_progress';
    let currentPool = 'running';
    let selectedTaskId = null;
    let actionInProgress = false;
    let lastSince = null;
    let showHistory = false;
    let diagnosticMode = false;
    const {
      safe,
      statusBadge,
      healthLabel,
      runtimeClass,
      parseTaskRoute,
      buildTaskRouteUrl,
      activeStageCard,
      buildGateIssues,
    } = window.TaskDashboardUtils;

    function applyRouteFromQuery() {
      const route = parseTaskRoute(window.location.search);
      showHistory = route.showHistory;
      diagnosticMode = route.diagnosticMode;
      selectedTaskId = route.selectedTaskId;
      currentFilter = route.currentFilter;
      currentPool = route.currentPool;
    }

    function syncRouteState() {
      const nextUrl = buildTaskRouteUrl(window.location.href, {
        showHistory,
        diagnosticMode,
        currentPool,
        selectedTaskId,
      });
      window.history.replaceState({}, '', nextUrl);
    }

    function activatePool(pool) {
      document.querySelectorAll('.pool-tab[data-pool]').forEach(el => {
        if (el.dataset.pool === pool) el.classList.add('active');
        else el.classList.remove('active');
      });
      syncRouteState();
    }

    function buildTaskPath() {
      const params = new URLSearchParams();
      if (showHistory) params.set('include_history', '1');
      if (currentPool === 'running') params.set('status', 'in_progress');
      else if (currentPool === 'completed') params.set('status', 'completed');
      else if (currentPool && currentPool !== 'all') params.set('task_pool', currentPool);
      else if (currentFilter !== 'all') params.set('status', currentFilter);
      const query = params.toString();
      return query ? `/api/tasks?${query}` : '/api/tasks';
    }

    async function fetchJSON(path, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const r = await fetch(`${API}${path}`, { signal: controller.signal });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    async function postJSON(path, payload, timeoutMs = 30000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const r = await fetch(`${API}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    async function loadTasks() {
      let list = [];
      let updatedAt = Date.now();
      if (currentPool === 'review_pool' || currentPool === 'recovery_pool') {
        const poolData = await fetchJSON('/api/task-pools');
        list = ((poolData.pools || {})[currentPool] || []);
        updatedAt = poolData.updated_at || Date.now();
      } else {
        const path = buildTaskPath();
        const data = await fetchJSON(path);
        list = data.tasks || [];
        if (data.next_since) lastSince = data.next_since;
        updatedAt = data.updated_at || Date.now();
      }
      document.getElementById('updatedAt').textContent = new Date(updatedAt).toLocaleString('zh-CN');

      const root = document.getElementById('taskList');
      if (!list.length) {
        root.innerHTML = '<div class="empty">当前过滤条件下无任务。</div>';
        document.getElementById('detail').innerHTML = '<div class="empty">无历史数据</div>';
        selectedTaskId = null;
        syncRouteState();
        return;
      }

      root.innerHTML = list.map((t, idx) => {
        const [txt, cls] = statusBadge(t.status);
        const selected = t.task_id === selectedTaskId ? 'selected' : '';
        const typeLabel = t.task_type === 'review_task' ? '审查单' : safe(t.task_type || '-');
        return `
          <article class="task ${selected}" data-id="${t.task_id}" style="animation-delay: ${Math.min(idx * 35, 280)}ms">
            <div class="row">
              <h3>${safe(t.task_name)}</h3>
              <span class="badge ${cls}">${txt}</span>
            </div>
            <div class="mono">${safe(t.task_id)} · ${typeLabel}</div>
            <div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, t.progress || 0))}%"></div></div>
            <div class="meta-grid">
              <div>进度：<strong>${t.progress || 0}%</strong></div>
              <div>阶段：<strong>${t.completed_stages || 0}/${t.total_stages || 0}</strong></div>
              <div>当前 Agent：<span class="mono">${safe(t.owner)}</span></div>
              <div>任务池：<span class="mono">${safe(t.task_pool || 'team_dispatch_pool')}</span></div>
            </div>
          </article>
        `;
      }).join('');

      root.querySelectorAll('.task').forEach(el => {
        el.addEventListener('click', async () => {
          selectedTaskId = el.dataset.id;
          syncRouteState();
          try {
            await renderDetail(selectedTaskId);
            await loadTasks();
          } catch (e) {
            document.getElementById('detail').innerHTML = `<div class="empty">详情加载失败: ${safe(e.message)}</div>`;
          }
        });
      });

      if (selectedTaskId && list.some(t => t.task_id === selectedTaskId)) {
        await renderDetail(selectedTaskId);
      } else if (!selectedTaskId) {
        selectedTaskId = list[0].task_id;
        syncRouteState();
        await renderDetail(selectedTaskId);
        await loadTasks();
      }
    }

    async function taskAction(taskId, action) {
      const opText = action === 'stop' ? '停止' : '重启';
      const ok = window.confirm(`确认${opText}任务 ${taskId} ?`);
      if (!ok) return;
      actionInProgress = true;
      try {
        const submit = await postJSON('/api/task/control', {
          task_id: taskId,
          action,
          operator: 'dashboard-ui',
          operator_role: 'admin',
          reason: 'manual_click',
          async: true,
        }, 10000);
        if (!submit.ok) {
          alert(`操作失败: ${safe(submit.error || submit.message)}`);
          return;
        }
        const done = await waitControlJob(submit.job_id, 60000);
        const result = done?.result || {};
        if (!result.ok) {
          alert(`${opText}失败: ${safe(result.error || done.error || done.state)}`);
          return;
        }
        alert(`${opText}已执行（模式: ${safe(result.mode || 'unknown')}）`);
        await refreshAll();
      } finally {
        actionInProgress = false;
      }
    }

    async function waitControlJob(jobId, timeoutMs = 60000) {
      const started = Date.now();
      while ((Date.now() - started) < timeoutMs) {
        const st = await fetchJSON(`/api/task/control-status?job_id=${encodeURIComponent(jobId)}`, 8000);
        if (!st.ok) throw new Error(st.error || '控制任务状态查询失败');
        if (st.state === 'finished' || st.state === 'failed') return st;
        await new Promise((r) => setTimeout(r, 1000));
      }
      throw new Error('控制操作超时，请稍后刷新查看最终状态');
    }

    async function deleteTask(taskId) {
      const ok = window.confirm(`确认归档删除任务 ${taskId} ? 可在后端恢复。`);
      if (!ok) return;
      actionInProgress = true;
      try {
        const res = await postJSON('/api/task/delete', {
          task_id: taskId,
          operator: 'dashboard-ui',
          operator_role: 'admin',
          reason: 'manual_delete'
        }, 20000);
        if (!res.ok) {
          alert(`删除失败: ${safe(res.error || res.message)}`);
          return;
        }
        selectedTaskId = null;
        await refreshAll();
        alert(`任务已归档删除\n${safe(res.archive_path)}`);
      } finally {
        actionInProgress = false;
      }
    }

    async function claimTask(taskId) {
      const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/claim`, {
        actor_id: 'dashboard-ui',
        actor_role: 'admin',
        actor_team: 'team-rd',
      }, 12000);
      if (!res.ok) throw new Error(res.error || '领取失败');
      return res;
    }

    async function suggestDispatch(taskId) {
      const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/dispatch-suggest`, {
        actor_id: 'dashboard-ui',
        actor_role: 'admin',
      }, 12000);
      if (!res.ok) throw new Error(res.error || '建议失败');
      return res;
    }

    async function confirmDispatch(taskId, assignedTo = null) {
      const payload = {
        actor_id: 'dashboard-ui',
        actor_role: 'admin',
        confirm: true,
      };
      if (assignedTo) payload.assigned_to = assignedTo;
      const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/dispatch-confirm`, payload, 12000);
      if (!res.ok) throw new Error(res.error || '确认失败');
      return res;
    }

    function renderControlAudit(auditList) {
      const list = auditList || [];
      if (!list.length) return '<div class="empty">暂无控制记录</div>';
      return `<ul class="audit-list">${list.map(x => `<li>${safe(x.ts)} · ${safe(x.action)} · mode=${safe(x.mode)} · op=${safe(x.operator)}${x.hard_error ? ` · err=${safe(x.hard_error)}` : ''}</li>`).join('')}</ul>`;
    }

    async function renderDetail(taskId) {
      const root = document.getElementById('detail');
      root.innerHTML = '<div class="empty">加载中...</div>';
      const d = await fetchJSON(`/api/task/detail?task_id=${encodeURIComponent(taskId)}`, 12000);

      if (d.error) {
        root.innerHTML = '<div class="empty">无历史数据</div>';
        return;
      }

      const [stText, stClass] = statusBadge(d.status);
      const [hText, hClass] = healthLabel(d.agent_health);
      const rtClass = runtimeClass(d.runtime_state);

      const stages = (d.stages || []).map(s => {
        const c = s.status === 'completed' ? 'done' : (s.status === 'in_progress' ? 'active' : '');
        const [sText, sClass] = statusBadge(s.status);
        return `
          <div class="stage ${c}">
            <div class="index">${safe(s.stage_id)}</div>
            <div>
              <div><strong>${safe(s.name)}</strong></div>
              <div style="font-size:12px;color:var(--muted);">${safe(s.description)}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px;">责任: <span class="mono">${safe(s.owner_role)} / ${safe(s.owner_agent)}</span></div>
            </div>
            <span class="badge ${sClass}">${sText}</span>
          </div>
        `;
      }).join('');

      const flow = (d.team_flow || []).map(t =>
        `<a class="team-link" href="team_dashboard.html?team=${encodeURIComponent(t)}">${safe(t)}</a>`
      ).join('');

      const todos = (d.todo_items || []).map(item => `<li>${safe(item)}</li>`).join('');
      const chat = d.session_link || {};
      const conflict = d?.data_quality?.file_conflict || {};
      const dispatchLock = d.dispatch_lock || {};
      const legacyReadonly = Boolean(d?.data_quality?.is_legacy);
      const reviewPackets = d?.raw?.review?.packets || [];
      const chiefDecision = d?.raw?.review?.chief_decision || {};
      const artifacts = Array.isArray(d.artifact_index) ? d.artifact_index : [];
      const stageCard = activeStageCard(d);
      const gateIssues = buildGateIssues(d);
      const gateHtml = gateIssues.length
        ? `<div class="gate-panel">${gateIssues.map((item) => `<div class="gate-item ${item.level}"><strong>${safe(item.title)}</strong><div style="margin-top:4px;color:var(--muted);">${safe(item.body)}</div></div>`).join('')}</div>`
        : '<div class="gate-panel"><div class="gate-item"><strong>Gate 状态稳定</strong><div style="margin-top:4px;color:var(--muted);">当前业务绑定、验收和 gate_result 没有发现阻断项。</div></div></div>';
      const disabledAttr = legacyReadonly ? 'disabled' : '';
      const legacyWarn = d?.data_quality?.is_legacy
        ? `<div style="margin-top:8px;font-size:12px;color:var(--warn);">该任务创建于 cutover 之前，默认按历史只读对待。</div>`
        : '';
      const conflictWarn = conflict?.has_conflict
        ? `<div style="margin-top:8px;font-size:12px;color:var(--danger);">检测到同一 task_id 存在多个任务文件且状态不一致（${safe(conflict.count)} 个），当前展示按最新 updated_at 选取。</div>`
        : '';

      root.innerHTML = `
        <div class="box">
          <h3>${safe(d.task_name)}</h3>
          <div class="mono">${safe(d.task_id)} · ${safe(d.task_type)}</div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="badge ${stClass}">${stText}</span>
            <span class="runtime-pill"><span class="pulse ${rtClass}"></span>运行态: ${safe(d.runtime_state)} / ${safe(d.runtime_hint)}</span>
            <span class="runtime-pill">实时数据: ${safe(chat.live_freshness || '-')}</span>
          </div>
          <div class="k2">
            <div><div class="v">${d.total_stages || 0}</div><div class="l">总阶段数</div></div>
            <div><div class="v">${d.completed_stages || 0}</div><div class="l">已完成</div></div>
            <div><div class="v">${d.remaining_stages || 0}</div><div class="l">剩余</div></div>
            <div><div class="v">${d.progress || 0}%</div><div class="l">总体进度</div></div>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--muted);">
            任务池: <span class="mono">${safe(d.task_pool)}</span> · 母任务: <span class="mono">${safe(d.parent_task_id || '-')}</span> · 租约: <span class="mono">${safe(dispatchLock.owner || '-')} / ${safe(dispatchLock.state || 'none')}</span>
          </div>
          <div class="detail-actions">
            <button class="btn" id="claimTaskBtn" ${disabledAttr}>领取任务</button>
            <button class="btn" id="suggestDispatchBtn" ${disabledAttr}>自动分发建议</button>
            <button class="btn" id="confirmDispatchBtn" ${disabledAttr}>确认自动分发</button>
            <button class="btn" id="openChatBtn">打开 Claw 会话</button>
            <button class="btn warn" id="stopTaskBtn" ${disabledAttr}>停止任务</button>
            <button class="btn primary" id="restartTaskBtn" ${disabledAttr}>重启任务</button>
            <button class="btn danger" id="deleteTaskBtn" ${disabledAttr}>删除任务</button>
          </div>
          <div style="margin-top:10px;font-size:12px;color:var(--muted);">会话匹配: confidence=${safe(chat.confidence)} · ${safe(chat.reason)} · ${safe(chat.session_key)}</div>
          <div style="margin-top:8px;font-size:12px;color:var(--muted);">
            business_truth_source: <span class="mono">${safe(d.business_truth_source || '-')}</span> ·
            acceptance_result: <span class="mono">${safe(d.acceptance_result || '-')}</span> ·
            gate_result: <span class="mono">${safe(d.gate_result || '-')}</span>
          </div>
          ${gateHtml}
          ${legacyWarn}
          ${conflictWarn}
          <div style="margin-top:10px;font-size:13px;color:var(--muted);">${safe(d.description)}</div>
        </div>

        <div class="box">
          <h3>总体计划与阶段进展</h3>
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px;">当前阶段：<strong>${safe(d.current_stage)}</strong> · 下一阶段：<strong>${safe(d.next_stage)}</strong></div>
          ${stages || '<div class="empty">无阶段数据</div>'}
        </div>

        <div class="box">
          <h3>任务具体要做什么</h3>
          ${todos ? `<ul class="todo-list">${todos}</ul>` : '<div class="empty">暂无明确待办</div>'}
        </div>

        <div class="box">
          <h3>执行与健康</h3>
          <div class="k2">
            <div><div class="v mono">${safe(d.owner)}</div><div class="l">当前 Agent</div></div>
            <div><div class="v mono">${safe(d.next_agent)}</div><div class="l">下一接手 Agent</div></div>
            <div><div class="v"><span class="health"><span class="dot ${hClass}"></span>${hText}</span></div><div class="l">运行健康</div></div>
            <div><div class="v">${d.agent_health?.is_stalled ? '是' : '否'}</div><div class="l">是否停滞</div></div>
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:8px;">最后心跳：${safe(d.agent_health?.last_heartbeat)} · sessions=${safe(d.agent_health?.sessions_count)}</div>
        </div>

        <div class="box">
          <h3>团队流转（点击查看团队）</h3>
          <div class="team-flow">${flow || '<span class="empty">暂无团队流转记录</span>'}</div>
        </div>

        <div class="box">
          <h3>控制审计</h3>
          ${renderControlAudit(d.control_audit)}
        </div>

        <div class="box">
          <h3>关键产物索引</h3>
          ${artifacts.length ? `<ul class="audit-list">${artifacts.map(item => `<li><span class="mono">${safe(item.artifact_type || '-')}</span> · <span class="mono">${safe(item.version || '-')}</span> · ${safe(item.summary || '-')} · <span class="mono">${safe(item.path || '-')}</span></li>`).join('')}</ul>` : '<div class="empty">暂无关键产物索引</div>'}
        </div>

        <div class="box">
          <h3>阶段交接与产物操作</h3>
          <div class="k2">
            <div><div class="v mono">${safe(stageCard?.stage_id || '-')}</div><div class="l">当前阶段卡</div></div>
            <div><div class="v mono">${safe(stageCard?.name || '-')}</div><div class="l">阶段名称</div></div>
            <div><div class="v mono">${safe(stageCard?.owner_agent || stageCard?.owner_role || '-')}</div><div class="l">当前责任人</div></div>
            <div><div class="v mono">${safe(stageCard?.status || '-')}</div><div class="l">阶段状态</div></div>
          </div>
          <div class="field-note">这组操作直接调用控制平面 API。历史任务保持只读，新任务可在这里补关键产物和阶段交接。</div>
          <div class="op-grid" style="margin-top:10px;">
            <input id="artifactTypeInput" type="text" placeholder="artifact type，例如 PRD" value="${safe(stageCard?.name || 'PRD')}" ${disabledAttr} />
            <input id="artifactVersionInput" type="text" placeholder="version，例如 v1" value="v1" ${disabledAttr} />
            <input id="artifactPathInput" type="text" placeholder="path，例如 /docs/prd.md" ${disabledAttr} />
            <input id="artifactProducerInput" type="text" placeholder="producer，例如 rd_lead" value="${safe(d.owner || 'dashboard-ui')}" ${disabledAttr} />
            <textarea id="artifactSummaryInput" placeholder="artifact summary" ${disabledAttr}></textarea>
          </div>
          <div class="detail-actions">
            <button class="btn" id="addArtifactBtn" ${disabledAttr}>添加关键产物</button>
          </div>
          <div class="op-grid" style="margin-top:14px;">
            <input id="handoffStageIdInput" type="number" min="1" step="1" value="${safe(stageCard?.stage_id || 1)}" ${disabledAttr} />
            <input id="handoffNextOwnerInput" type="text" placeholder="next owner，例如 rd_tester" value="${safe(stageCard?.next_owner || d.next_agent || '')}" ${disabledAttr} />
            <textarea id="handoffNoteInput" placeholder="handoff note" ${disabledAttr}></textarea>
            <textarea id="handoffArtifactSummaryInput" placeholder="artifact summary for handoff" ${disabledAttr}></textarea>
          </div>
          <div class="detail-actions">
            <button class="btn primary" id="handoffStageBtn" ${disabledAttr}>提交阶段交接</button>
          </div>
        </div>

        ${(d.raw?.review?.review_id) ? `
        <div class="box">
          <h3>关联审查</h3>
          <a href="system_dashboard.html?governance=review&review_id=${encodeURIComponent(d.raw.review.review_id)}" class="btn" target="_blank" rel="noopener">在系统治理中查看审查</a>
          <div class="mono" style="margin-top:8px;">${safe(d.raw.review.review_id)}</div>
        </div>
        ` : ''}
        ${diagnosticMode ? `
        <details class="box" open>
          <summary><strong>诊断元数据</strong></summary>
          <div class="mono" style="margin-top:8px;">routing: ${safe(JSON.stringify(d.raw?.routing || null))}</div>
          <div class="mono">review: ${safe(JSON.stringify(d.raw?.review || null))}</div>
          <div class="mono">learning: ${safe(JSON.stringify(d.raw?.learning || null))}</div>
        </details>
        ` : `
        <div class="box">
          <h3>诊断入口</h3>
          <a class="btn" href="task_dashboard.html?task_id=${encodeURIComponent(taskId)}&pool=${encodeURIComponent(currentPool)}${showHistory ? '&include_history=1' : ''}&diagnostic=1">开启诊断模式查看原始元数据</a>
        </div>
        `}
      `;

      if (d.task_type === 'review_task') {
        root.innerHTML = `
          <div class="box">
            <h3>${safe(d.task_name)}</h3>
            <div class="mono">${safe(d.task_id)} · 审查任务</div>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span class="badge ${stClass}">${stText}</span>
              <span class="runtime-pill"><span class="pulse ${rtClass}"></span>运行态: ${safe(d.runtime_state)} / ${safe(d.runtime_hint)}</span>
              <span class="runtime-pill">任务池: ${safe(d.task_pool)}</span>
            </div>
            <div style="margin-top:10px;font-size:13px;color:var(--muted);">${safe(d.description)}</div>
            <div class="detail-actions">
              <button class="btn warn" id="reclaimReviewBtn">回收审查</button>
            </div>
          </div>
          <div class="box">
            <h3>Chief 决议</h3>
            <div class="mono">${safe(JSON.stringify(chiefDecision || null))}</div>
          </div>
          <div class="box">
            <h3>Reviewer Packets</h3>
            ${reviewPackets.length ? `<ul class="audit-list">${reviewPackets.map(p => `<li>${safe(p.reviewer_id)} · ${safe(p.verdict)} · ${safe((p.findings || []).join(' / '))}</li>`).join('')}</ul>` : '<div class="empty">暂无 reviewer packet</div>'}
          </div>
          <div class="box">
            <h3>恢复审计</h3>
            ${renderControlAudit(d.control_audit)}
          </div>
        `;
      }

      const openBtn = document.getElementById('openChatBtn');
      const claimBtn = document.getElementById('claimTaskBtn');
      const suggestBtn = document.getElementById('suggestDispatchBtn');
      const confirmBtn = document.getElementById('confirmDispatchBtn');
      const stopBtn = document.getElementById('stopTaskBtn');
      const restartBtn = document.getElementById('restartTaskBtn');
      const delBtn = document.getElementById('deleteTaskBtn');
      const reclaimReviewBtn = document.getElementById('reclaimReviewBtn');
      const addArtifactBtn = document.getElementById('addArtifactBtn');
      const handoffStageBtn = document.getElementById('handoffStageBtn');

      claimBtn?.addEventListener('click', async () => {
        try {
          const res = await claimTask(taskId);
          alert(`领取成功: ${safe(res.claimed_by)}`);
          await refreshAll();
        } catch (e) {
          alert(`领取失败: ${safe(e.message)}`);
        }
      });
      suggestBtn?.addEventListener('click', async () => {
        try {
          const res = await suggestDispatch(taskId);
          const sg = res?.suggestion || {};
          alert(`建议已生成: ${safe(sg.recommended_agent)} (${safe(sg.recommended_role)})`);
          await refreshAll();
        } catch (e) {
          alert(`建议失败: ${safe(e.message)}`);
        }
      });
      confirmBtn?.addEventListener('click', async () => {
        try {
          const target = d?.raw?.dispatch_suggestion?.recommended_agent || null;
          await confirmDispatch(taskId, target);
          alert(`已确认分发${target ? `: ${target}` : ''}`);
          await refreshAll();
        } catch (e) {
          alert(`确认失败: ${safe(e.message)}`);
        }
      });
      openBtn?.addEventListener('click', async () => {
        try {
          const latest = await fetchJSON(`/api/task/chat-link?task_id=${encodeURIComponent(taskId)}`, 10000);
          const url = latest?.url || chat?.url;
          if (!url) {
            alert('没有可用会话链接');
            return;
          }
          window.open(url, '_blank', 'noopener,noreferrer');
        } catch (e) {
          alert(`打开会话失败: ${safe(e.message)}`);
        }
      });
      stopBtn?.addEventListener('click', async () => {
        try { await taskAction(taskId, 'stop'); } catch (e) { alert(`停止失败: ${e.message}`); }
      });
      restartBtn?.addEventListener('click', async () => {
        try { await taskAction(taskId, 'restart'); } catch (e) { alert(`重启失败: ${e.message}`); }
      });
      delBtn?.addEventListener('click', async () => {
        try { await deleteTask(taskId); } catch (e) { alert(`删除失败: ${e.message}`); }
      });
      addArtifactBtn?.addEventListener('click', async () => {
        try {
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/artifact`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            artifact_type: document.getElementById('artifactTypeInput')?.value?.trim(),
            path: document.getElementById('artifactPathInput')?.value?.trim(),
            version: document.getElementById('artifactVersionInput')?.value?.trim(),
            summary: document.getElementById('artifactSummaryInput')?.value?.trim(),
            producer: document.getElementById('artifactProducerInput')?.value?.trim(),
          }, 12000);
          if (!res.ok) throw new Error(res.error || '添加失败');
          alert(`关键产物已添加: ${safe(res.artifact?.artifact_type)}`);
          await refreshAll();
        } catch (e) {
          alert(`添加产物失败: ${safe(e.message)}`);
        }
      });
      handoffStageBtn?.addEventListener('click', async () => {
        try {
          const stageId = document.getElementById('handoffStageIdInput')?.value?.trim();
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/stage/${encodeURIComponent(stageId)}/handoff`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            handoff_note: document.getElementById('handoffNoteInput')?.value?.trim(),
            artifact_summary: document.getElementById('handoffArtifactSummaryInput')?.value?.trim(),
            next_owner: document.getElementById('handoffNextOwnerInput')?.value?.trim(),
          }, 12000);
          if (!res.ok) throw new Error(res.error || '交接失败');
          alert('阶段交接已提交');
          await refreshAll();
        } catch (e) {
          alert(`阶段交接失败: ${safe(e.message)}`);
        }
      });
      reclaimReviewBtn?.addEventListener('click', async () => {
        try {
          const res = await postJSON(`/api/reviews/${encodeURIComponent(taskId)}/reclaim`, {
            actor_id: 'luban',
            actor_role: 'admin',
            action: 'reclaim',
          }, 12000);
          if (!res.ok) throw new Error(res.error || '回收失败');
          alert('审查已回收到恢复队列');
          await refreshAll();
        } catch (e) {
          alert(`回收失败: ${safe(e.message)}`);
        }
      });
    }

    async function refreshAll() {
      await loadTasks();
    }

    document.querySelectorAll('.pool-tab[data-pool]').forEach(el => {
      el.addEventListener('click', async () => {
        currentPool = el.dataset.pool;
        if (currentPool === 'running') currentFilter = 'in_progress';
        else if (currentPool === 'completed') currentFilter = 'completed';
        else currentFilter = 'all';
        selectedTaskId = null;
        activatePool(currentPool);
        await loadTasks();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      try { await refreshAll(); } catch (e) { alert(`刷新失败: ${e.message}`); }
    });

    document.getElementById('historyToggle').addEventListener('change', async (e) => {
      showHistory = Boolean(e.target.checked);
      selectedTaskId = null;
      syncRouteState();
      try { await refreshAll(); } catch (err) { alert(`切换失败: ${err.message}`); }
    });

    (async () => {
      try {
        applyRouteFromQuery();
        activatePool(currentPool);
        document.getElementById('historyToggle').checked = showHistory;
        await refreshAll();
        syncRouteState();
        setInterval(async () => {
          if (actionInProgress) return;
          try { await refreshAll(); } catch (_) {}
        }, 20000);
      } catch (e) {
        console.error(e);
        alert(`加载失败: ${e.message}`);
      }
    })();
  </script>
</body>
</html>
