<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw · 任务管理中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f6f4;
      --panel: #fff;
      --ink: #1f2a24;
      --muted: #5d6c62;
      --line: #d8dfd8;
      --brand: #0f7b57;
      --brand-2: #145a43;
      --accent: #bf7a2a;
      --ok: #0e9e5a;
      --warn: #cf851d;
      --danger: #be3b33;
      --shadow: 0 8px 24px rgba(15, 35, 24, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Manrope, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 480px at -10% 0%, #e0f1e7 0%, transparent 65%),
        radial-gradient(1200px 480px at 120% 0%, #f7ebdc 0%, transparent 60%),
        var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 14px;
      padding: 14px;
      min-height: 100vh;
    }

    .side {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(170deg, #f8fcf9 0%, #edf4ef 100%);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 14px;
      height: calc(100vh - 28px);
    }

    .brand { border-bottom: 1px solid var(--line); padding-bottom: 12px; }
    .brand h2 { margin: 0; font-size: 20px; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 12px; }

    .menu { display: grid; gap: 8px; }
    .menu a {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .menu a:hover { border-color: #8ebea4; background: #f1faf4; }
    .menu a.active {
      border-color: #7fb497;
      background: linear-gradient(135deg, #e9f7ef 0%, #f7f6ef 100%);
      color: var(--brand);
    }

    .main { min-width: 0; }
    .shell { max-width: 1520px; margin: 0 auto; padding: 24px 24px 24px 0; }

    .top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 12px;
      margin-bottom: 6px;
    }

    .top .actions { margin-left: auto; display: flex; gap: 8px; }
    .actions { display: flex; gap: 10px; }
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { border-color: var(--brand); color: var(--brand); }
    .btn.primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; border-color: transparent; }
    .btn.warn { border-color: #f2d7b4; color: #9e5e19; background: #fff4e6; }
    .btn.danger { border-color: #e5bcb8; color: #a43731; background: #fff0ef; }
    .btn:disabled { opacity: .45; cursor: not-allowed; border-color: var(--line); color: var(--muted); background: #f3f5f3; }

    .pool-tabs {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 6px;
      margin: 0;
      padding: 0 0 4px 0;
      border: none;
      background: transparent;
      box-shadow: none;
      white-space: nowrap;
    }
    .pool-tabs::-webkit-scrollbar { height: 4px; }
    .pool-tabs::-webkit-scrollbar-thumb { background: #d3ddd6; border-radius: 4px; }

    .pool-tab {
      border: 1px solid #d3ddd6;
      border-radius: 999px;
      background: #f7faf8;
      color: #2f4639;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      cursor: pointer;
    }
    .pool-tab.active {
      border-color: #82b89e;
      background: #ebf8f0;
      color: var(--brand);
    }

    .layout {
      position: relative;
    }
    
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(16, 36, 24, 0.3);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      backdrop-filter: blur(2px);
    }
    .detail-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    
    .detail-panel {
      position: fixed;
      top: 14px;
      right: -100%;
      bottom: 14px;
      width: 680px;
      max-width: calc(100vw - 28px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 12px 48px rgba(15, 35, 24, 0.18);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .detail-panel.open {
      right: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
    }

    .panel .head h2 { margin: 0; font-size: 17px; }
    .head .meta { color: var(--muted); font-size: 12px; }

    .task-list {
      max-height: calc(100vh - 160px);
      overflow: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 10px;
      align-content: start;
    }

    .task {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 0px;
      cursor: pointer;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .task.selected { border-color: #89c4ab; background: #f2fbf6; }
    .task:hover { border-color: #a5ccb9; }
    .task { opacity: 0; transform: translateY(6px); animation: taskFadeIn 0.22s ease forwards; }
    @keyframes taskFadeIn { to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) {
      .task { animation: none; opacity: 1; transform: none; }
    }

    .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .task h3 { margin: 0; font-size: 14px; }
    .mono { font-family: "IBM Plex Mono", monospace; font-size: 11px; color: var(--muted); }

    .badge {
      font-size: 11px;
      border-radius: 999px;
      padding: 3px 9px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .s-completed { background: #e8f8ef; color: #0e8450; border-color: #bde3cc; }
    .s-in_progress { background: #e8f3ff; color: #1563ad; border-color: #bed9f5; }
    .s-pending { background: #fff4e6; color: #9e5e19; border-color: #f2d7b4; }
    .s-unknown { background: #f0f2f0; color: #64756b; border-color: #d7dfd9; }

    .bar {
      margin-top: 8px;
      height: 8px;
      background: #ecf0ec;
      border-radius: 999px;
      overflow: hidden;
    }

    .fill { height: 100%; background: linear-gradient(90deg, var(--brand), #3ea37e); }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .detail {
      padding: 14px;
      flex: 1;
      overflow-y: auto;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .box h3 { margin: 0 0 8px; font-size: 14px; }

    .k2 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 6px;
    }

    .k2 div { background: #f6f8f6; border-radius: 10px; padding: 8px; border: 1px solid #e3e9e4; }
    .k2 .v { font-weight: 800; color: var(--brand); }
    .k2 .l { font-size: 11px; color: var(--muted); }

    .stage {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      margin: 6px 0;
      background: #fff;
    }

    .stage.done { border-color: #c7e5d5; background: #f4fcf7; }
    .stage.active { border-color: #b7d8f3; background: #f3f9ff; }

    .index {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #edf1ed;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #4d5d54;
    }

    .team-flow { display: flex; flex-wrap: wrap; gap: 8px; }
    .team-link {
      text-decoration: none;
      border: 1px solid #c9d9cf;
      border-radius: 999px;
      padding: 6px 10px;
      color: #2a493a;
      font-size: 12px;
      background: #f4faf6;
    }

    .health { display: inline-flex; align-items: center; gap: 6px; font-weight: 800; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .healthy { background: var(--ok); }
    .warning { background: var(--warn); }
    .stale { background: var(--danger); }
    .unknown { background: #8a988f; }

    .runtime-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #d6e2da;
      background: #f7fbf9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .trust-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .trust-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d6e2da;
      background: #f7fbf9;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      color: #2a493a;
    }

    .trust-pill.ok {
      border-color: #c7e5d5;
      background: #f4fcf7;
      color: #1f513a;
    }

    .trust-pill.danger {
      border-color: #f0c9c9;
      background: #fdf2f2;
      color: #8b2b2b;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .pulse.running { background: var(--ok); box-shadow: 0 0 0 0 rgba(14, 158, 90, 0.55); animation: pulse 1.4s infinite; }
    .pulse.stalled { background: var(--danger); box-shadow: 0 0 0 0 rgba(190, 59, 51, 0.45); animation: pulse 1.6s infinite; }
    .pulse.idle { background: var(--warn); }
    .pulse.unknown { background: #98a69d; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(14, 158, 90, 0.45); }
      70% { box-shadow: 0 0 0 12px rgba(14, 158, 90, 0); }
      100% { box-shadow: 0 0 0 0 rgba(14, 158, 90, 0); }
    }

    .todo-list { margin: 0; padding-left: 20px; }
    .todo-list li { margin: 6px 0; font-size: 13px; }

    .audit-list { margin: 0; padding-left: 18px; }
    .audit-list li { margin: 6px 0; font-size: 12px; color: var(--muted); }

    .detail-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

    .empty { color: var(--muted); font-size: 13px; }

    .gate-panel {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .gate-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f8fbf9;
      font-size: 12px;
    }

    .gate-item.warn {
      border-color: #f2d7b4;
      background: #fff6eb;
    }

    .gate-item.danger {
      border-color: #e5bcb8;
      background: #fff1ef;
    }

    .op-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .op-grid textarea,
    .op-grid input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      background: #fbfdfb;
      color: var(--ink);
    }

    .op-grid textarea {
      min-height: 92px;
      resize: vertical;
      grid-column: 1 / -1;
    }

    .field-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 1200px) {
      .app { grid-template-columns: 1fr; padding: 10px; }
      .side { position: static; height: auto; flex-direction: row; align-items: center; flex-wrap: wrap; padding: 10px 14px; }
      .brand { border-bottom: none; border-right: 1px solid var(--line); padding-right: 14px; padding-bottom: 0; display: flex; align-items: center; gap: 10px; }
      .brand h2 { font-size: 16px; }
      .brand p { margin: 0; }
      .menu { display: flex; flex-direction: row; gap: 6px; overflow-x: auto; flex: 1; align-items: center; }
      .shell { padding: 10px 0; }
      .task-list { max-height: calc(100vh - 180px); }
    }

    @media (max-width: 820px) {
      .shell { padding: 10px 0; }
      .k2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .top { align-items: flex-start; }
      .top .actions { margin-left: 0; }
      .task-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <h2>OpenClaw</h2>
        <p>Dashboard 控制台</p>
      </div>
      <nav class="menu">
        <a class="active" href="task_dashboard.html">任务管理中心</a>
        <a href="system_dashboard.html">系统架构管理中心</a>
      </nav>
    </aside>

    <main class="main">
      <div class="shell">
        <header class="top">
          <nav class="pool-tabs" id="poolTabs">
            <button class="pool-tab active" data-pool="running">运行中</button>
            <button class="pool-tab" data-pool="intake_pool">待拆解池</button>
            <button class="pool-tab" data-pool="team_dispatch_pool">团队领取池</button>
            <button class="pool-tab" data-pool="governance_pool">治理池</button>
            <button class="pool-tab" data-pool="review_pool">审查池</button>
            <button class="pool-tab" data-pool="recovery_pool">恢复池</button>
            <button class="pool-tab" data-pool="alerts">告警</button>
            <button class="pool-tab" data-pool="completed">已完成</button>
          </nav>
          <div class="actions">
            <label class="btn" style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;font-size:12px;">
              <input type="checkbox" id="historyToggle" />
              <span>历史</span>
            </label>
            <button class="btn primary" id="refreshBtn" style="padding:6px 12px;font-size:12px;">刷新</button>
          </div>
        </header>

        <div class="layout">
          <section class="panel">
            <div class="head" style="align-items: center;">
              <h2>任务列表</h2>
              <div class="meta">更新时间：<span id="updatedAt">-</span></div>
            </div>
            <div class="task-list" id="taskList"></div>
          </section>

          <div class="detail-overlay" id="detailOverlay"></div>
          <section class="detail-panel" id="detailPanel">
            <div class="head" style="display:flex; justify-content:space-between; align-items:center; padding: 12px 14px; border-bottom: 1px solid var(--line);">
              <div>
                <h2 style="margin:0;font-size:17px;">任务详情</h2>
                <div class="meta" style="color:var(--muted);font-size:12px;">详情及操作台</div>
              </div>
              <button id="closeDetailBtn" style="background:transparent;border:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1;display:flex;align-items:center;justify-content:center;height:24px;width:24px;">&times;</button>
            </div>
            <div class="detail" id="detail">
              <div class="empty">加载中...</div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="static/task_dashboard_utils.js"></script>
  <script>
    const API = `${window.location.protocol}//${window.location.host}`;
    let currentFilter = 'in_progress';
    let currentPool = 'running';
    let selectedTaskId = null;
    let actionInProgress = false;
    let lastSince = null;
    let showHistory = false;
    let diagnosticMode = false;
    let currentTeam = '';
    let currentTeamFocus = '';
    let currentInterTeamFlow = '';
    let lastActionResult = null;
    const {
      safe,
      statusBadge,
      healthLabel,
      runtimeClass,
      parseTaskRoute,
      buildTaskRouteUrl,
      activeStageCard,
      buildGateIssues,
    } = window.TaskDashboardUtils;

    function applyRouteFromQuery() {
      const route = parseTaskRoute(window.location.search);
      showHistory = route.showHistory;
      diagnosticMode = route.diagnosticMode;
      selectedTaskId = route.selectedTaskId;
      currentFilter = route.currentFilter;
      currentPool = route.currentPool;
      currentTeam = route.team || '';
      currentTeamFocus = route.teamFocus || '';
      currentInterTeamFlow = route.interTeamFlow || '';
    }

    function syncRouteState() {
      const nextUrl = buildTaskRouteUrl(window.location.href, {
        showHistory,
        diagnosticMode,
        currentPool,
        selectedTaskId,
        team: currentTeam,
        teamFocus: currentTeamFocus,
        interTeamFlow: currentInterTeamFlow,
      });
      window.history.replaceState({}, '', nextUrl);
    }

    function activatePool(pool) {
      document.querySelectorAll('.pool-tab[data-pool]').forEach(el => {
        if (el.dataset.pool === pool) el.classList.add('active');
        else el.classList.remove('active');
      });
      syncRouteState();
    }

    function buildTaskPath() {
      const params = new URLSearchParams();
      if (showHistory) params.set('include_history', '1');
      if (currentTeam) params.set('team', currentTeam);
      if (currentTeamFocus) params.set('team_focus', currentTeamFocus);
      if (currentInterTeamFlow) params.set('inter_team_flow', currentInterTeamFlow);
      if (currentPool === 'running' || currentPool === 'alerts') params.set('status', 'in_progress');
      else if (currentPool === 'completed') params.set('status', 'completed');
      else if (currentPool && currentPool !== 'all') params.set('task_pool', currentPool);
      else if (currentFilter !== 'all') params.set('status', currentFilter);
      const query = params.toString();
      return query ? `/api/tasks?${query}` : '/api/tasks';
    }

    async function fetchJSON(path, timeoutMs = 12000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const r = await fetch(`${API}${path}`, { signal: controller.signal });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    async function postJSON(path, payload, timeoutMs = 30000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      const r = await fetch(`${API}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {}),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return await r.json();
    }

    async function loadTasks() {
      let list = [];
      let updatedAt = Date.now();
      if (currentPool === 'review_pool' || currentPool === 'recovery_pool') {
        const poolData = await fetchJSON('/api/task-pools');
        list = ((poolData.pools || {})[currentPool] || []);
        updatedAt = poolData.updated_at || Date.now();
      } else {
        const path = buildTaskPath();
        const data = await fetchJSON(path);
        list = data.tasks || [];
        if (data.next_since) lastSince = data.next_since;
        updatedAt = data.updated_at || Date.now();
      }

      // 告警视图：仅展示存在 Gate 问题的任务，避免在主列表里挤占空间
      if (currentPool === 'alerts') {
        list = list.filter(t => t.task_type !== 'review_task' && buildGateIssues(t).length > 0);
      }
      document.getElementById('updatedAt').textContent = new Date(updatedAt).toLocaleString('zh-CN');

      const root = document.getElementById('taskList');
      if (!list.length) {
        root.innerHTML = '<div class="empty">当前过滤条件下无任务。</div>';
        document.getElementById('detail').innerHTML = '<div class="empty">无历史数据</div>';
        selectedTaskId = null;
        syncRouteState();
        return;
      }

      root.innerHTML = list.map((t, idx) => {
        const [txt, cls] = statusBadge(t.status);
        const selected = t.task_id === selectedTaskId ? 'selected' : '';
        const typeLabel = t.task_type === 'review_task' ? '审查单' : safe(t.task_type || '-');
        const rtClass = runtimeClass(t.runtime_state);
        const runtimeText = t.runtime_state ? `${safe(t.runtime_state)} / ${safe(t.runtime_hint)}` : '-';
        const liveFreshness = safe(t.live_freshness || '-');
        const gateIssues = t.task_type === 'review_task' ? [] : buildGateIssues(t);
        const gateLabel = gateIssues.length ? `阻断 ${gateIssues.length}` : 'Gate OK';
        const gateClass = gateIssues.length ? 'danger' : 'ok';
        return `
          <article class="task ${selected}" data-id="${t.task_id}" style="animation-delay: ${Math.min(idx * 35, 280)}ms">
            <div class="row">
              <h3>${safe(t.task_name)}</h3>
              <span class="badge ${cls}">${txt}</span>
            </div>
            <div class="mono">${safe(t.task_id)} · ${typeLabel}</div>
            <div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, t.progress || 0))}%"></div></div>

              <span class="trust-pill"><span class="pulse ${rtClass}"></span>运行态: ${runtimeText}</span>
              <span class="trust-pill">实时数据: ${liveFreshness}</span>
              <span class="trust-pill ${gateClass}">Gate: ${gateLabel}</span>
            </div>
            <div class="meta-grid">
              <div>进度：<strong>${t.progress || 0}%</strong></div>
              <div>阶段：<strong>${t.completed_stages || 0}/${t.total_stages || 0}</strong></div>
              <div>当前 Agent：<span class="mono">${safe(t.owner)}</span></div>
              <div>任务池：<span class="mono">${safe(t.task_pool || 'team_dispatch_pool')}</span></div>
            </div>
          </article>
        `;
      }).join('');

      root.querySelectorAll('.task').forEach(el => {
        el.addEventListener('click', async () => {
          selectedTaskId = el.dataset.id;
          
          root.querySelectorAll('.task').forEach(t => t.classList.remove('selected'));
          el.classList.add('selected');
          
          document.getElementById('detailPanel').classList.add('open');
          document.getElementById('detailOverlay').classList.add('open');
          
          syncRouteState();
          try {
            await renderDetail(selectedTaskId);
          } catch (e) {
            document.getElementById('detail').innerHTML = `<div class="empty">详情加载失败: ${safe(e.message)}</div>`;
          }
        });
      });

      if (selectedTaskId && list.some(t => t.task_id === selectedTaskId)) {
        document.getElementById('detailPanel').classList.add('open');
        document.getElementById('detailOverlay').classList.add('open');
        await renderDetail(selectedTaskId);
      } else {
        selectedTaskId = null;
        document.getElementById('detailPanel').classList.remove('open');
        document.getElementById('detailOverlay').classList.remove('open');
        syncRouteState();
      }
    }

    async function taskAction(taskId, action) {
      const opText = action === 'stop' ? '停止' : '重启';
      const ok = window.confirm(`确认${opText}任务 ${taskId} ?`);
      if (!ok) return;
      actionInProgress = true;
      try {
        const submit = await postJSON('/api/task/control', {
          task_id: taskId,
          action,
          operator: 'dashboard-ui',
          operator_role: 'admin',
          reason: 'manual_click',
          async: true,
        }, 10000);
        if (!submit.ok) {
          alert(`操作失败: ${safe(submit.error || submit.message)}`);
          return;
        }
        const done = await waitControlJob(submit.job_id, 60000);
        const result = done?.result || {};
        if (!result.ok) {
          alert(`${opText}失败: ${safe(result.error || done.error || done.state)}`);
          return;
        }
        alert(`${opText}已执行（模式: ${safe(result.mode || 'unknown')}）`);
        await refreshAll();
      } finally {
        actionInProgress = false;
      }
    }

    async function waitControlJob(jobId, timeoutMs = 60000) {
      const started = Date.now();
      while ((Date.now() - started) < timeoutMs) {
        const st = await fetchJSON(`/api/task/control-status?job_id=${encodeURIComponent(jobId)}`, 8000);
        if (!st.ok) throw new Error(st.error || '控制任务状态查询失败');
        if (st.state === 'finished' || st.state === 'failed') return st;
        await new Promise((r) => setTimeout(r, 1000));
      }
      throw new Error('控制操作超时，请稍后刷新查看最终状态');
    }

    async function deleteTask(taskId) {
      const ok = window.confirm(`确认归档删除任务 ${taskId} ? 可在后端恢复。`);
      if (!ok) return;
      actionInProgress = true;
      try {
        const res = await postJSON('/api/task/delete', {
          task_id: taskId,
          operator: 'dashboard-ui',
          operator_role: 'admin',
          reason: 'manual_delete'
        }, 20000);
        if (!res.ok) {
          alert(`删除失败: ${safe(res.error || res.message)}`);
          return;
        }
        selectedTaskId = null;
        await refreshAll();
        alert(`任务已归档删除\n${safe(res.archive_path)}`);
      } finally {
        actionInProgress = false;
      }
    }

        <div class="box">
          <h3>关联审查</h3>
          <a href="task_dashboard.html?task_id=${encodeURIComponent(d.raw.review.review_id)}" class="btn" target="_blank" rel="noopener">在任务中心查看审查</a>
          <div class="mono" style="margin-top:8px;">${safe(d.raw.review.review_id)}</div>
        </div>
        ` : ''}
        ${diagnosticMode ? `
        <details class="box" open>
          <summary><strong>诊断元数据</strong></summary>
          <div class="mono" style="margin-top:8px;">routing: ${safe(JSON.stringify(d.raw?.routing || null))}</div>
          <div class="mono">review: ${safe(JSON.stringify(d.raw?.review || null))}</div>
          <div class="mono">learning: ${safe(JSON.stringify(d.raw?.learning || null))}</div>
        </details>
        ` : `
        <div class="box">
          <h3>诊断入口</h3>
          <a class="btn" href="task_dashboard.html?task_id=${encodeURIComponent(taskId)}&pool=${encodeURIComponent(currentPool)}${showHistory ? '&include_history=1' : ''}&diagnostic=1">开启诊断模式查看原始元数据</a>
        </div>
        `}
      `;

      if (d.task_type === 'review_task') {
        root.innerHTML = `
          ${closureHtml}
          <div class="box">
            <h3>${safe(d.task_name)}</h3>
            <div class="mono">${safe(d.task_id)} · 审查任务</div>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <span class="badge ${stClass}">${stText}</span>
              <span class="runtime-pill"><span class="pulse ${rtClass}"></span>运行态: ${safe(d.runtime_state)} / ${safe(d.runtime_hint)}</span>
              <span class="runtime-pill">任务池: ${safe(d.task_pool)}</span>
            </div>
            <div style="margin-top:10px;font-size:13px;color:var(--muted);">${safe(d.description)}</div>
            <div class="detail-actions">
              <button class="btn warn" id="reclaimReviewBtn">回收审查</button>
            </div>
          </div>
          <div class="box">
            <h3>Chief 决议</h3>
            <div class="mono">${safe(JSON.stringify(chiefDecision || null))}</div>
          </div>
          <div class="box">
            <h3>Reviewer Packets</h3>
            ${reviewPackets.length ? `<ul class="audit-list">${reviewPackets.map(p => `<li>${safe(p.reviewer_id)} · ${safe(p.verdict)} · ${safe((p.findings || []).join(' / '))}</li>`).join('')}</ul>` : '<div class="empty">暂无 reviewer packet</div>'}
          </div>
          <div class="box">
            <h3>恢复审计</h3>
            ${renderControlAudit(d.control_audit)}
          </div>
        `;
      }

      const openBtn = document.getElementById('openChatBtn');
      const claimBtn = document.getElementById('claimTaskBtn');
      const suggestBtn = document.getElementById('suggestDispatchBtn');
      const confirmBtn = document.getElementById('confirmDispatchBtn');
      const stopBtn = document.getElementById('stopTaskBtn');
      const restartBtn = document.getElementById('restartTaskBtn');
      const delBtn = document.getElementById('deleteTaskBtn');
      const reclaimReviewBtn = document.getElementById('reclaimReviewBtn');
      const addArtifactBtn = document.getElementById('addArtifactBtn');
      const handoffStageBtn = document.getElementById('handoffStageBtn');
      const applyRecommendedActionBtn = document.getElementById('applyRecommendedActionBtn');
      const requestBusinessInputBtn = document.getElementById('requestBusinessInputBtn');
      const assignOwnerBtn = document.getElementById('assignOwnerBtn');
      const confirmHandoffBtn = document.getElementById('confirmHandoffBtn');
      const returnToReworkBtn = document.getElementById('returnToReworkBtn');

      claimBtn?.addEventListener('click', async () => {
        try {
          const res = await claimTask(taskId);
          alert(`领取成功: ${safe(res.claimed_by)}`);
          await refreshAll();
        } catch (e) {
          alert(`领取失败: ${safe(e.message)}`);
        }
      });
      suggestBtn?.addEventListener('click', async () => {
        try {
          const res = await suggestDispatch(taskId);
          const sg = res?.suggestion || {};
          alert(`建议已生成: ${safe(sg.recommended_agent)} (${safe(sg.recommended_role)})`);
          await refreshAll();
        } catch (e) {
          alert(`建议失败: ${safe(e.message)}`);
        }
      });
      confirmBtn?.addEventListener('click', async () => {
        try {
          const target = d?.raw?.dispatch_suggestion?.recommended_agent || null;
          await confirmDispatch(taskId, target);
          alert(`已确认分发${target ? `: ${target}` : ''}`);
          await refreshAll();
        } catch (e) {
          alert(`确认失败: ${safe(e.message)}`);
        }
      });
      openBtn?.addEventListener('click', async () => {
        try {
          const latest = await fetchJSON(`/api/task/chat-link?task_id=${encodeURIComponent(taskId)}`, 10000);
          const url = latest?.url || chat?.url;
          if (!url) {
            alert('没有可用会话链接');
            return;
          }
          window.open(url, '_blank', 'noopener,noreferrer');
        } catch (e) {
          alert(`打开会话失败: ${safe(e.message)}`);
        }
      });
      stopBtn?.addEventListener('click', async () => {
        try { await taskAction(taskId, 'stop'); } catch (e) { alert(`停止失败: ${e.message}`); }
      });
      restartBtn?.addEventListener('click', async () => {
        try { await taskAction(taskId, 'restart'); } catch (e) { alert(`重启失败: ${e.message}`); }
      });
      delBtn?.addEventListener('click', async () => {
        try { await deleteTask(taskId); } catch (e) { alert(`删除失败: ${e.message}`); }
      });
      applyRecommendedActionBtn?.addEventListener('click', async () => {
        try {
          const res = await applyRecommendedAction(taskId);
          alert(`已应用建议: ${safe(res.applied_action || d.next_recommended_action)}`);
          await refreshAll();
        } catch (e) {
          alert(`应用建议失败: ${safe(e.message)}`);
        }
      });
      requestBusinessInputBtn?.addEventListener('click', async () => {
        try {
          const requestedFrom = document.getElementById('requestBusinessInputFrom')?.value?.trim();
          const missingInputs = document.getElementById('requestBusinessInputMissing')?.value?.trim();
          const note = document.getElementById('requestBusinessInputNote')?.value?.trim();
          if (!requestedFrom || !missingInputs) {
            setActionResult(taskId, false, '补输入未提交', '请至少填写请求对象和缺失输入。');
            return;
          }
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/request-business-input`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            requested_from: requestedFrom,
            missing_inputs: missingInputs,
            note,
          }, 12000);
          if (!res.ok) throw new Error(res.error || '发起失败');
          setActionResult(taskId, true, '已发起补输入', '系统已将任务推进到等待输入状态。', safe(res.result_summary || ''));
          await refreshAll();
        } catch (e) {
          setActionResult(taskId, false, '补输入失败', safe(e.message));
        }
      });
      assignOwnerBtn?.addEventListener('click', async () => {
        try {
          const assignedTo = document.getElementById('assignOwnerAgent')?.value?.trim();
          const assignedTeam = document.getElementById('assignOwnerTeam')?.value?.trim();
          const reason = document.getElementById('assignOwnerReason')?.value?.trim();
          if (!assignedTo) {
            setActionResult(taskId, false, '指派未提交', '请先填写负责人 Agent。');
            return;
          }
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/assign-owner`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            assigned_to: assignedTo,
            assigned_team: assignedTeam,
            reason,
          }, 12000);
          if (!res.ok) throw new Error(res.error || '指派失败');
          setActionResult(taskId, true, '已指派负责人', '负责人和团队信息已更新。', safe(res.result_summary || ''));
          await refreshAll();
        } catch (e) {
          setActionResult(taskId, false, '指派负责人失败', safe(e.message));
        }
      });
      confirmHandoffBtn?.addEventListener('click', async () => {
        try {
          const stageId = document.getElementById('confirmHandoffStageId')?.value?.trim();
          const handoffNote = document.getElementById('confirmHandoffNote')?.value?.trim();
          const artifactSummary = document.getElementById('confirmHandoffArtifactSummary')?.value?.trim();
          const nextOwner = document.getElementById('confirmHandoffNextOwner')?.value?.trim();
          if (!stageId || !handoffNote || !artifactSummary || !nextOwner) {
            setActionResult(taskId, false, '交接未提交', '请完整填写阶段、下一接手人、交接说明和产物摘要。');
            return;
          }
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/confirm-handoff`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            stage_id: stageId,
            handoff_note: handoffNote,
            artifact_summary: artifactSummary,
            next_owner: nextOwner,
          }, 12000);
          if (!res.ok) throw new Error(res.error || '交接失败');
          setActionResult(taskId, true, '交接已确认', '交接信息已写入任务并推进阶段状态。', safe(res.result_summary || ''));
          await refreshAll();
        } catch (e) {
          setActionResult(taskId, false, '确认交接失败', safe(e.message));
        }
      });
      returnToReworkBtn?.addEventListener('click', async () => {
        try {
          const reworkOwner = document.getElementById('returnToReworkOwner')?.value?.trim();
          const reason = document.getElementById('returnToReworkReason')?.value?.trim();
          if (!reworkOwner || !reason) {
            setActionResult(taskId, false, '返工回退未提交', '请填写返工责任人和返工原因。');
            return;
          }
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/return-to-rework-owner`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            rework_owner: reworkOwner,
            reason,
          }, 12000);
          if (!res.ok) throw new Error(res.error || '返工失败');
          setActionResult(taskId, true, '已回退返工', '任务已回退给返工责任人。', safe(res.result_summary || ''));
          await refreshAll();
        } catch (e) {
          setActionResult(taskId, false, '返工回退失败', safe(e.message));
        }
      });
      addArtifactBtn?.addEventListener('click', async () => {
        try {
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/artifact`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            artifact_type: document.getElementById('artifactTypeInput')?.value?.trim(),
            path: document.getElementById('artifactPathInput')?.value?.trim(),
            version: document.getElementById('artifactVersionInput')?.value?.trim(),
            summary: document.getElementById('artifactSummaryInput')?.value?.trim(),
            producer: document.getElementById('artifactProducerInput')?.value?.trim(),
          }, 12000);
          if (!res.ok) throw new Error(res.error || '添加失败');
          alert(`关键产物已添加: ${safe(res.artifact?.artifact_type)}`);
          await refreshAll();
        } catch (e) {
          alert(`添加产物失败: ${safe(e.message)}`);
        }
      });
      handoffStageBtn?.addEventListener('click', async () => {
        try {
          const stageId = document.getElementById('handoffStageIdInput')?.value?.trim();
          const res = await postJSON(`/api/tasks/${encodeURIComponent(taskId)}/stage/${encodeURIComponent(stageId)}/handoff`, {
            actor_id: 'dashboard-ui',
            actor_role: 'admin',
            handoff_note: document.getElementById('handoffNoteInput')?.value?.trim(),
            artifact_summary: document.getElementById('handoffArtifactSummaryInput')?.value?.trim(),
            next_owner: document.getElementById('handoffNextOwnerInput')?.value?.trim(),
          }, 12000);
          if (!res.ok) throw new Error(res.error || '交接失败');
          alert('阶段交接已提交');
          await refreshAll();
        } catch (e) {
          alert(`阶段交接失败: ${safe(e.message)}`);
        }
      });
      reclaimReviewBtn?.addEventListener('click', async () => {
        try {
          const res = await postJSON(`/api/reviews/${encodeURIComponent(taskId)}/reclaim`, {
            actor_id: 'luban',
            actor_role: 'admin',
            action: 'reclaim',
          }, 12000);
          if (!res.ok) throw new Error(res.error || '回收失败');
          alert('审查已回收到恢复队列');
          await refreshAll();
        } catch (e) {
          alert(`回收失败: ${safe(e.message)}`);
        }
      });
    }

    async function refreshAll() {
      await loadTasks();
    }

    document.querySelectorAll('.pool-tab[data-pool]').forEach(el => {
      el.addEventListener('click', async () => {
        currentPool = el.dataset.pool;
        if (currentPool === 'running') currentFilter = 'in_progress';
        else if (currentPool === 'completed') currentFilter = 'completed';
        else currentFilter = 'all';
        currentTeamFocus = '';
        selectedTaskId = null;
        activatePool(currentPool);
        await loadTasks();
      });
    });

    document.getElementById('refreshBtn').addEventListener('click', async () => {
      try { await refreshAll(); } catch (e) { alert(`刷新失败: ${e.message}`); }
    });

    document.getElementById('historyToggle').addEventListener('change', async (e) => {
      showHistory = Boolean(e.target.checked);
      selectedTaskId = null;
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('detailOverlay').classList.remove('open');
      syncRouteState();
      try { await refreshAll(); } catch (err) { alert(`切换失败: ${err.message}`); }
    });

    document.getElementById('closeDetailBtn').addEventListener('click', () => {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('detailOverlay').classList.remove('open');
    });

    document.getElementById('detailOverlay').addEventListener('click', () => {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('detailOverlay').classList.remove('open');
    });

    (async () => {
      try {
        applyRouteFromQuery();
        activatePool(currentPool);
        document.getElementById('historyToggle').checked = showHistory;
        await refreshAll();
        syncRouteState();
        setInterval(async () => {
          if (actionInProgress) return;
          try { await refreshAll(); } catch (_) {}
        }, 20000);
      } catch (e) {
        console.error(e);
        alert(`加载失败: ${e.message}`);
      }
    })();
  </script>
</body>
</html>
