<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排程管理中心 - OpenClaw</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; color: #00d9ff; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1em; }
        .last-update { color: #00ff88; font-size: 0.9em; margin-top: 10px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: rgba(15, 52, 96, 0.5);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #0f3460;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #0f3460;
        }
        .card-title { font-size: 1.3em; color: #00d9ff; }
        .card-icon { font-size: 2em; }
        .card-content { font-size: 1.1em; }
        .stat-value { font-size: 3em; font-weight: bold; color: #00ff88; }
        .stat-label { color: #888; margin-top: 5px; }
        
        .status-ok { color: #00ff88; }
        .status-warning { color: #ffaa00; }
        .status-error { color: #ff4444; }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #0f3460;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            transition: width 0.5s;
        }
        
        .task-list { list-style: none; }
        .task-item {
            padding: 15px;
            margin: 10px 0;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 10px;
            border-left: 4px solid #00d9ff;
        }
        .task-item.pending { border-left-color: #ffaa00; }
        .task-item.completed { border-left-color: #00ff88; }
        .task-item.in_progress { border-left-color: #00d9ff; }
        .task-title { font-weight: bold; margin-bottom: 5px; }
        .task-meta { font-size: 0.85em; color: #888; }
        
        .cron-list { list-style: none; }
        .cron-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 8px;
        }
        .cron-schedule { font-family: monospace; color: #00d9ff; }
        .cron-name { flex: 1; margin-left: 15px; }
        .cron-status { padding: 5px 12px; border-radius: 20px; font-size: 0.85em; }
        .cron-status.active { background: #00ff88; color: #000; }
        .cron-status.inactive { background: #ff4444; color: #fff; }
        
        .pipeline-phases { list-style: none; }
        .pipeline-phase {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(15, 52, 96, 0.3);
            border-radius: 10px;
        }
        .phase-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        .phase-number.completed { background: #00ff88; color: #000; }
        .phase-number.in_progress { background: #00d9ff; color: #000; }
        .phase-number.pending { background: #444; }
        .phase-info { flex: 1; }
        .phase-name { font-weight: bold; }
        .phase-status { font-size: 0.85em; color: #888; }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
            transition: transform 0.3s;
        }
        .refresh-btn:hover { transform: scale(1.1) rotate(180deg); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 排程管理中心</h1>
            <p class="subtitle">OpenClaw 统一任务调度与监控系统</p>
            <p class="last-update"><span class="live-indicator"></span>实时更新中 - <span id="updateTime">--:--:--</span></p>
        </header>
        
        <!-- 概览卡片 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">审查队列</span>
                    <span class="card-icon">📋</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="reviewPending">0</div>
                    <div class="stat-label">待处理审查</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="reviewProgress" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">任务状态</span>
                    <span class="card-icon">📊</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="taskActive">0</div>
                    <div class="stat-label">进行中任务</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="taskProgress" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">系统健康</span>
                    <span class="card-icon">💚</span>
                </div>
                <div class="card-content">
                    <div class="stat-value status-ok" id="healthStatus">健康</div>
                    <div class="stat-label">最后检查：<span id="healthLastCheck">--</span></div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Cron 任务</span>
                    <span class="card-icon">⏰</span>
                </div>
                <div class="card-content">
                    <div class="stat-value" id="cronCount">0</div>
                    <div class="stat-label">已配置任务</div>
                </div>
            </div>
        </div>
        
        <!-- 流水线进度 -->
        <div class="card" style="margin-bottom: 30px;">
            <div class="card-header">
                <span class="card-title">🔧 外部工作流引擎改造流水线</span>
                <span class="card-icon">🏗️</span>
            </div>
            <div class="card-content">
                <ul class="pipeline-phases" id="pipelinePhases">
                    <!-- 动态加载 -->
                </ul>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📌 进行中任务</span>
                    <span class="card-icon">🔥</span>
                </div>
                <div class="card-content">
                    <ul class="task-list" id="taskInProgress">
                        <!-- 动态加载 -->
                    </ul>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header">
                    <span class="card-title">⏳ 待处理任务</span>
                    <span class="card-icon">⏰</span>
                </div>
                <div class="card-content">
                    <ul class="task-list" id="taskPending">
                        <!-- 动态加载 -->
                    </ul>
                </div>
            </div>
        </div>
        
        <!-- Cron 配置 -->
        <div class="card">
            <div class="card-header">
                <span class="card-title">⚙️ Cron 排程配置</span>
                <span class="card-icon">📅</span>
            </div>
            <div class="card-content">
                <ul class="cron-list" id="cronList">
                    <!-- 动态加载 -->
                </ul>
            </div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadData()" title="刷新数据">🔄</button>
    
    <script>
        // 模拟数据 (实际应从 API 获取)
        const mockData = {
            reviews: { pending: 0, in_review: 1, completed: 65 },
            tasks: { active: 1, pending: 11, completed: 60 },
            health: { status: 'healthy', last_check: new Date().toISOString() },
            cron: [
                { schedule: '*/1 * * * *', name: 'event_bus.js', status: 'active' },
                { schedule: '*/5 * * * *', name: 'review_queue_system.sh', status: 'active' },
                { schedule: '*/10 * * * *', name: 'state_sync.js', status: 'active' },
                { schedule: '*/30 * * * *', name: 'health_check.sh', status: 'active' }
            ],
            pipeline: [
                { id: 1, name: '基础框架实施', status: 'completed' },
                { id: 2, name: '完整配置', status: 'completed' },
                { id: 3, name: '集成测试', status: 'completed' },
                { id: 4, name: '问题整改', status: 'completed' },
                { id: 5, name: '迁移文档', status: 'completed' },
                { id: 6, name: '监控告警', status: 'completed' }
            ],
            tasksInProgress: [
                { id: 'TASK-20260313-008', title: '外部工作流引擎 - Phase 2 完整配置', owner: 'pangu', started_at: new Date().toISOString() }
            ],
            tasksPending: [
                { id: 'TASK-20260313-001', title: '阻塞点识别功能开发', owner: 'pangu', priority: 'P2' },
                { id: 'TASK-20260313-002', title: '会话生命周期管理 - Phase 1', owner: 'luban', priority: 'P0' },
                { id: 'TASK-20260313-003', title: '模型决策自主性分级 - Phase 1', owner: 'luban', priority: 'P0' },
                { id: 'TASK-20260313-004', title: '定时任务治理 - Phase 1', owner: 'luban', priority: 'P0' }
            ]
        };
        
        function updateStats() {
            document.getElementById('reviewPending').textContent = mockData.reviews.pending;
            document.getElementById('taskActive').textContent = mockData.tasks.active;
            document.getElementById('healthStatus').textContent = mockData.health.status === 'healthy' ? '健康' : '异常';
            document.getElementById('healthLastCheck').textContent = new Date(mockData.health.last_check).toLocaleTimeString('zh-CN');
            document.getElementById('cronCount').textContent = mockData.cron.length;
            
            // 进度条
            const reviewTotal = mockData.reviews.pending + mockData.reviews.in_review + mockData.reviews.completed;
            document.getElementById('reviewProgress').style.width = (reviewTotal > 0 ? (mockData.reviews.completed / reviewTotal * 100) : 0) + '%';
            
            const taskTotal = mockData.tasks.active + mockData.tasks.pending + mockData.tasks.completed;
            document.getElementById('taskProgress').style.width = (taskTotal > 0 ? (mockData.tasks.completed / taskTotal * 100) : 0) + '%';
        }
        
        function renderPipeline() {
            const html = mockData.pipeline.map(phase => `
                <li class="pipeline-phase">
                    <div class="phase-number ${phase.status}">${phase.id}</div>
                    <div class="phase-info">
                        <div class="phase-name">${phase.name}</div>
                        <div class="phase-status status-${phase.status === 'completed' ? 'ok' : phase.status === 'in_progress' ? 'warning' : ''}">
                            ${phase.status === 'completed' ? '✅ 已完成' : phase.status === 'in_progress' ? '🔄 进行中' : '⏳ 等待中'}
                        </div>
                    </div>
                </li>
            `).join('');
            document.getElementById('pipelinePhases').innerHTML = html;
        }
        
        function renderTasks() {
            const inProgressHtml = mockData.tasksInProgress.map(task => `
                <li class="task-item in_progress">
                    <div class="task-title">${task.title}</div>
                    <div class="task-meta">负责人：${task.owner} | 开始：${new Date(task.started_at).toLocaleTimeString('zh-CN')}</div>
                </li>
            `).join('');
            document.getElementById('taskInProgress').innerHTML = inProgressHtml;
            
            const pendingHtml = mockData.tasksPending.map(task => `
                <li class="task-item pending">
                    <div class="task-title">${task.title}</div>
                    <div class="task-meta">负责人：${task.owner} | 优先级：${task.priority}</div>
                </li>
            `).join('');
            document.getElementById('taskPending').innerHTML = pendingHtml;
        }
        
        function renderCron() {
            const html = mockData.cron.map(cron => `
                <li class="cron-item">
                    <span class="cron-schedule">${cron.schedule}</span>
                    <span class="cron-name">${cron.name}</span>
                    <span class="cron-status ${cron.status}">${cron.status === 'active' ? '运行中' : '已停止'}</span>
                </li>
            `).join('');
            document.getElementById('cronList').innerHTML = html;
        }
        
        function loadData() {
            // 实际应从 API 获取数据
            // fetch('/api/schedule/status').then(r => r.json()).then(data => { ... })
            updateStats();
            renderPipeline();
            renderTasks();
            renderCron();
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN');
        }
        
        // 初始加载
        loadData();
        
        // 每 10 秒自动刷新
        setInterval(loadData, 10000);
    </script>
</body>
</html>
